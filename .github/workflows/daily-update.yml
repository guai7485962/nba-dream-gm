name: 每週更新 NBA 球員數據

# 只負責「抓資料 → 把 players.db commit 回 repo」。
# 部署交給 Cloudflare Pages：它監看 repo，任何 push（包含這個 workflow 的資料更新）都會自動 build + deploy。
on:
  schedule:
    - cron: '0 15 * * 1'   # 每週一台灣時間 23:00 自動更新
  workflow_dispatch:         # 也可在 GitHub 網頁手動觸發

permissions:
  contents: write            # 允許把更新後的 players.db 推回 repo

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: 取得程式碼
        uses: actions/checkout@v4

      - name: 設定 Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: 安裝套件
        run: pip install -r requirements.txt

      - name: 抓取 NBA 球員數據（含真實薪資，失敗自動重試）
        run: |
          for i in 1 2 3; do
            echo "嘗試第 $i 次..."
            python fetch_players.py --real-salary && break
            echo "失敗，等待 30 秒後重試..."
            sleep 30
          done
          exit 0

      - name: 提交更新後的 players.db（觸發 Cloudflare 自動部署）
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add players.db players.json
          git diff --cached --quiet || git commit -m "weekly: 更新球員數據"
          git push
