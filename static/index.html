<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>夢之隊 GM・放置版</title>
<style>
:root{
  --arena:#101218; --panel:#1a1d26; --panel2:#22262f; --line:#2e333f;
  --ink:#f2efe8; --dim:#9aa0ad; --maple:#d98e3f; --maple-deep:#a35f1f;
  --led:#ffb02e; --good:#5fd97a; --bad:#ff6b6b; --blue:#5aa7ff;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{background:var(--arena);color:var(--ink);font-family:-apple-system,"PingFang TC","Noto Sans TC",sans-serif;font-size:15px;overscroll-behavior:none}
#app{max-width:520px;margin:0 auto;min-height:100%;display:flex;flex-direction:column}
header{padding:14px 16px 10px;border-bottom:2px solid var(--maple-deep);background:linear-gradient(180deg,#171a22,#101218);position:sticky;top:0;z-index:20}
.h-row{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
.h-title{font-size:19px;font-weight:800;letter-spacing:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.h-title .dot{color:var(--maple)}
.h-sub{font-size:12px;color:var(--dim);margin-top:3px;display:flex;gap:12px;flex-wrap:wrap}
.cap-bar{height:6px;background:var(--panel2);border-radius:3px;margin-top:8px;overflow:hidden}
.cap-fill{height:100%;background:linear-gradient(90deg,var(--maple),#e8b25f);border-radius:3px;transition:width .3s}
.cap-fill.over{background:var(--bad)}
main{flex:1;padding:12px 12px 84px}
nav{position:fixed;bottom:0;left:0;right:0;z-index:30;display:flex;max-width:520px;margin:0 auto;background:#14161d;border-top:1px solid var(--line);padding-bottom:env(safe-area-inset-bottom)}
nav button{flex:1;background:none;border:none;color:var(--dim);padding:10px 0 12px;font-size:12px;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:3px;position:relative}
nav button .ic{font-size:18px;line-height:1}
nav button.on{color:var(--led);font-weight:700}
nav button .badge{position:absolute;top:6px;right:18%;width:8px;height:8px;border-radius:50%;background:var(--bad)}
h2{font-size:15px;margin:6px 2px 10px;letter-spacing:.5px}
h2 .tag{font-size:11px;color:var(--dim);font-weight:400;margin-left:8px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:10px}
.p-row{display:flex;align-items:center;gap:10px;padding:9px 10px;border-bottom:1px solid var(--line);flex-wrap:wrap}
.p-row:last-child{border-bottom:none}
.p-row2{flex-basis:100%;display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-top:5px}
.ovr{min-width:40px;height:40px;border-radius:9px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:800;font-size:16px;background:var(--panel2);border:1px solid var(--line);line-height:1}
.ovr small{font-size:8px;font-weight:500;color:var(--dim);margin-top:1px}
.ovr.elite{color:#ffd166;border-color:#8a6a1f;background:#2a2415}   /* 金：頂級 */
.ovr.great{color:#c79bff;border-color:#5a3a8a;background:#211a2e}   /* 紫：明星 */
.ovr.solid{color:var(--blue)}                                       /* 藍：先發 */
.ovr.ok{color:var(--good)}                                          /* 綠：輪替 */
.p-info{flex:1;min-width:0}
.p-name{font-weight:700;font-size:14.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.p-meta{font-size:11px;color:var(--dim);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.p-stat{display:flex;gap:13px;font-size:11px;color:var(--dim);margin-top:4px;white-space:nowrap;overflow:hidden}
.p-stat b{color:var(--ink);font-weight:700;font-size:12.5px;margin-left:2px;font-family:Menlo,monospace}
.p-stat .d{color:var(--blue)}
.sta{height:5px;background:var(--panel2);border-radius:3px;overflow:hidden;width:110px;flex:0 0 110px}
.sta-wrap{display:flex;align-items:center;gap:6px;font-size:10.5px;color:var(--dim)}
.sta i{display:block;height:100%;border-radius:2px;background:var(--good)}
.sta i.mid{background:var(--led)} .sta i.low{background:var(--bad)}
.p-sal{font-size:13px;font-weight:700;text-align:right;white-space:nowrap}
.p-sal small{display:block;font-size:10px;color:var(--dim);font-weight:400}
.btn{background:var(--maple);color:#1a1208;border:none;border-radius:9px;padding:10px 14px;font-size:14px;font-weight:800;font-family:inherit;letter-spacing:.5px}
.btn:active{transform:scale(.97)}
.btn.ghost{background:var(--panel2);color:var(--ink);border:1px solid var(--line);font-weight:600}
.btn.danger{background:#3a1f1f;color:var(--bad);border:1px solid #5a2e2e}
.btn.sm{padding:7px 11px;font-size:12.5px;border-radius:8px}
.btn:disabled{opacity:.4}
.btn.block{display:block;width:100%;margin-top:10px}
.muted{color:var(--dim);font-size:12.5px;line-height:1.6}
.pill{display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;background:var(--panel2);border:1px solid var(--line);color:var(--dim)}
.pill.gold{color:#ffd166;border-color:#8a6a1f}
.pill.red{color:var(--bad);border-color:#5a2e2e}
.pill.green{color:var(--good);border-color:#2e5a3a}
input,select{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--ink);border-radius:9px;padding:10px 12px;font-size:15px;font-family:inherit}
.scoreboard{background:#0b0c10;border:2px solid var(--maple-deep);border-radius:14px;padding:14px;margin-bottom:12px;box-shadow:inset 0 0 30px rgba(217,142,63,.07)}
.sb-teams{display:flex;justify-content:space-between;align-items:center;gap:8px}
.sb-team{flex:1;text-align:center;min-width:0}
.sb-name{font-size:12px;color:var(--dim);letter-spacing:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-score{font-family:"SF Mono",Menlo,monospace;font-size:42px;font-weight:700;color:var(--led);text-shadow:0 0 14px rgba(255,176,46,.45);line-height:1.1}
.sb-score.lose{color:#6f7480;text-shadow:none}
.sb-vs{font-size:11px;color:var(--maple);font-weight:800}
.sb-q{display:flex;justify-content:center;margin-top:10px;border-top:1px dashed #2a2e38;padding-top:8px}
.sb-q table{border-collapse:collapse;font-family:"SF Mono",Menlo,monospace;font-size:12px}
.sb-q td,.sb-q th{padding:2px 10px;text-align:center;color:var(--dim)}
.sb-q td{color:var(--ink)} .sb-q th{font-weight:400;font-size:10px}
.countdown{font-family:"SF Mono",Menlo,monospace;font-size:34px;font-weight:700;color:var(--led);text-shadow:0 0 14px rgba(255,176,46,.4);text-align:center;letter-spacing:2px}
.av-ph{border-radius:50%;background:var(--panel2);color:var(--dim);display:flex;align-items:center;justify-content:center;font-weight:700}
.av-wrap{position:relative;flex-shrink:0}
.lrow{display:flex;gap:4px;justify-content:center;margin-bottom:6px}
.lrow.mine .lchip{border-color:var(--maple-deep)}
.lchip{flex:1;min-width:0;display:flex;flex-direction:column;align-items:center;gap:1px;padding:4px 2px;background:#14161d;border:1px solid var(--line);border-radius:8px;transition:transform .15s,box-shadow .15s,border-color .15s}
.lchip .lc-av{opacity:.55;transition:opacity .15s}
.lchip .ln{font-size:10px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.lchip .lp{font-size:8px;color:var(--dim)}
.lchip.active{border-color:var(--led);box-shadow:0 0 10px rgba(255,176,46,.5);transform:translateY(-2px) scale(1.04)}
.lchip.active .lc-av{opacity:1}
.lchip.def{border-color:var(--blue);box-shadow:0 0 8px rgba(90,150,255,.35)}
.lchip.def .lc-av{opacity:.9}
.court2{position:relative;height:120px;background:linear-gradient(#191c24,#13151c);border:2px solid var(--maple-deep);border-radius:12px;overflow:hidden;margin-bottom:6px}
.court2 .c-arc{position:absolute;bottom:4%;left:50%;transform:translateX(-50%);width:70%;height:78%;border:2px solid #2c313d;border-bottom:none;border-radius:50% 50% 0 0/72% 72% 0 0}
.court2 .c-key{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:30%;height:42%;border:2px solid #2c313d;border-bottom:none;background:rgba(217,142,63,.05)}
.court2 .c-hoop{position:absolute;bottom:5%;left:50%;transform:translateX(-50%);width:12px;height:12px;border:2px solid var(--maple);border-radius:50%}
.watchlog.short{height:108px}
.watchlog{height:300px;overflow-y:auto;background:#0b0c10;border:1px solid var(--line);border-radius:10px;padding:6px 8px;margin-bottom:8px;display:flex;flex-direction:column}
.court3{position:relative;height:248px;background:radial-gradient(120% 80% at 50% 92%,#222734,#14161d);border:2px solid var(--maple-deep);border-radius:12px;overflow:hidden;margin-bottom:6px}
.court3 .c-arc{position:absolute;bottom:2%;left:50%;transform:translateX(-50%);width:80%;height:150%;border:2px solid #2c313d;border-bottom:none;border-radius:50% 50% 0 0/64% 64% 0 0}
.court3 .c-key{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:26%;height:32%;border:2px solid #2c313d;border-bottom:none;background:rgba(217,142,63,.05)}
.court3 .c-hoop{position:absolute;bottom:6%;left:50%;transform:translateX(-50%);width:13px;height:13px;border:2px solid var(--maple);border-radius:50%}
.ptok{position:absolute;transform:translate(-50%,-50%);transition:left .42s ease,top .42s ease;display:flex;flex-direction:column;align-items:center;gap:2px;z-index:2}
.ptok .pt-av{border-radius:50%;transition:transform .2s,box-shadow .2s;box-shadow:0 0 0 2px #3a4256}
.ptok.mine .pt-av{box-shadow:0 0 0 2px var(--maple)}
.ptok.opp .pt-av{box-shadow:0 0 0 2px #51607d}
.ptok .pt-n{font-size:9px;font-weight:700;line-height:1.2;white-space:nowrap;color:var(--ink);background:rgba(0,0,0,.45);padding:0 4px;border-radius:5px}
.ptok.on-def .pt-av{opacity:.78}
.ptok.shooter{z-index:6}
.ptok.shooter .pt-av{transform:scale(1.22);box-shadow:0 0 0 2px var(--led),0 0 14px rgba(255,176,46,.75)}
.ptok.guard .pt-av{box-shadow:0 0 0 2px var(--blue),0 0 9px rgba(90,150,255,.55);opacity:1}
.ball{position:absolute;transform:translate(-50%,-50%);transition:left .26s ease,top .34s ease;font-size:15px;z-index:7;filter:drop-shadow(0 1px 3px rgba(0,0,0,.7))}
.glyphpop{position:absolute;transform:translate(-50%,-50%) scale(.5);opacity:0;font-size:30px;z-index:8;pointer-events:none;transition:opacity .16s,transform .16s}
.glyphpop.show{opacity:1;transform:translate(-50%,-50%) scale(1.1)}
.wcap{text-align:center;font-size:12.5px;font-weight:700;min-height:18px;margin-bottom:8px;color:var(--dim)}
.wcap.a-make{color:var(--led)} .wcap.a-blk{color:#c79bff} .wcap.a-stl{color:var(--blue)} .wcap.a-miss,.wcap.a-tov{color:var(--dim)}
.lbx-head{display:flex;justify-content:space-between;align-items:center;font-size:12.5px;font-weight:700;color:var(--dim);padding:4px 6px;margin-top:6px}
.lbx-head.mine{color:var(--led)}
.lbx-head .lbx-sc{font-family:Menlo,monospace;font-size:16px;color:var(--ink);font-weight:700}
.lbx-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:8px;background:#0b0c10}
table.lbx{border-collapse:collapse;width:100%;font-family:Menlo,monospace;font-size:11px}
.lbx th{font-weight:400;font-size:9.5px;color:var(--dim);padding:4px 5px;text-align:center;border-bottom:1px solid var(--line);white-space:nowrap}
.lbx td{padding:3px 5px;text-align:center;color:var(--ink);white-space:nowrap;border-bottom:1px solid #181b22}
.lbx th.bx-nh{text-align:left}
.lbx td.bx-name{text-align:left}
.lbx .bx-av,.lbx .bx-n{display:inline-block;vertical-align:middle}
.lbx .bx-av{margin-right:5px}
.lbx .bx-n{font-family:inherit;font-size:11px}
.lbx .bx-pos{font-size:8px;color:var(--dim);margin-left:3px}
.lbx .bx-dot{width:5px;height:5px;border-radius:50%;background:var(--led);display:inline-block;margin-right:3px;vertical-align:middle}
.lbx .bx-pts{font-weight:700;color:var(--led)}
.lbx tbody tr{transition:background .3s}
.lbx tbody tr.fl{background:rgba(217,142,63,.16)}
.wline{display:flex;gap:8px;align-items:baseline;font-size:12px;padding:3px 2px;border-bottom:1px solid #181b22;animation:wfade .25s ease-out}
@keyframes wfade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.wline .wt{flex-shrink:0;width:56px;font-family:Menlo,monospace;font-size:10px;color:var(--dim)}
.wline .wx{flex:1;color:var(--ink)}
.wline .ws{flex-shrink:0;font-family:Menlo,monospace;font-size:10px;color:var(--dim)}
.wline.l-m3 .wx{color:var(--led);font-weight:700}
.wline.l-m2 .wx{color:var(--good)}
.wline.l-blk .wx{color:#c79bff;font-weight:600}
.wline.l-stl .wx{color:var(--blue);font-weight:600}
.wline.l-miss .wx,.wline.l-tov .wx{color:var(--dim)}
.wline.mine{background:rgba(217,142,63,.07);border-radius:4px}
.watchctl{display:flex;gap:6px;margin-bottom:8px}
.watchctl .btn{flex:1}
.slot-dots{display:flex;justify-content:center;gap:10px;margin-top:8px}
.slot-dots span{width:10px;height:10px;border-radius:50%;background:var(--panel2);border:1px solid var(--line)}
.slot-dots span.done{background:var(--maple);border-color:var(--maple)}
.standing-row{display:flex;align-items:center;gap:8px;padding:8px 6px;border-bottom:1px solid var(--line);font-size:13.5px}
.standing-row:last-child{border:none}
.standing-row .rk{width:24px;color:var(--dim);font-family:Menlo,monospace;font-size:12px}
.standing-row .nm{flex:1;font-weight:600;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.standing-row .nm.me{color:var(--led)}
.standing-row .wl{font-family:Menlo,monospace;color:var(--dim);font-size:12.5px}
.res-row{display:flex;align-items:center;gap:8px;padding:8px 6px;border-bottom:1px solid var(--line);font-size:13px}
.res-row:last-child{border:none}
.res-row .sc{font-family:Menlo,monospace;font-weight:700}
.sel{outline:2px solid var(--led);outline-offset:-2px;border-radius:10px;background:#241f12}
.starter{outline:2px solid var(--good);outline-offset:-2px;border-radius:10px;background:#13231a}
.modal-bg{position:fixed;inset:0;background:rgba(5,6,9,.82);z-index:50;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--panel);border:1px solid var(--line);border-radius:18px 18px 0 0;width:100%;max-width:520px;max-height:88vh;overflow-y:auto;padding:16px 14px calc(20px + env(safe-area-inset-bottom))}
.modal h3{font-size:16px;margin-bottom:10px}
.boxline{display:flex;justify-content:space-between;font-size:13px;padding:5px 2px;border-bottom:1px dashed #262a34}
.boxline:last-child{border:none}
.boxline .bn{font-weight:600} .boxline .bs{font-family:Menlo,monospace;color:var(--dim)}
.boxtbl{width:100%;border-collapse:collapse;font-size:12px}
.boxtbl th{font-weight:400;font-size:10px;color:var(--dim);padding:3px 2px;text-align:center;border-bottom:1px solid var(--line)}
.boxtbl td{text-align:center;padding:4px 2px;color:var(--dim);font-family:Menlo,monospace;border-bottom:1px solid #21252e}
.boxtbl tbody tr:last-child td{border-bottom:none}
.boxtbl td:first-child{font-family:inherit;color:var(--ink)}
.tbasket{display:flex;align-items:center;gap:8px}
.tb-col{flex:1;min-width:0}
.tb-chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;min-height:20px}
.bchip{font-size:11px;background:var(--panel2);border:1px solid var(--line);border-radius:6px;padding:2px 6px;white-space:nowrap}
.tgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.tcol-h{font-size:12px;font-weight:700;color:var(--maple);padding:4px 2px 6px;position:sticky;top:118px;background:var(--arena)}
.tcard{display:flex;align-items:center;gap:7px;padding:6px;border:1px solid var(--line);border-radius:9px;margin-bottom:6px;background:var(--panel)}
.tcard.on{outline:2px solid var(--led);outline-offset:-2px;background:#241f12}
.tname{font-size:12.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%);background:#0b0c10;border:1px solid var(--maple-deep);color:var(--ink);padding:10px 16px;border-radius:99px;font-size:13.5px;z-index:60;box-shadow:0 6px 24px rgba(0,0,0,.5);white-space:nowrap;animation:pop .2s ease-out}
@keyframes pop{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.empty{padding:28px 10px;text-align:center;color:var(--dim);font-size:13.5px;line-height:1.7}
.flex{display:flex;align-items:center;gap:8px}
.mv-chip{font-size:11px;font-family:Menlo,monospace;margin-top:3px}
.mv-chip .v{color:var(--ink);font-weight:700}
.up{color:#ff5f5f} .dn{color:#41c878}
.spark{display:block;margin-top:6px}
.form-ic{font-size:11px}
.spacer{flex:1}
.bracket .vs{display:flex;align-items:center;gap:6px;padding:7px 4px;font-size:13px;border-bottom:1px dashed #262a34}
.bracket .vs:last-child{border:none}
.bracket b{font-family:Menlo,monospace}
.court{position:relative;width:100%;max-width:330px;margin:8px auto 6px;aspect-ratio:1/0.9;background:linear-gradient(#191c24,#13151c);border:2px solid var(--maple-deep);border-radius:12px;overflow:hidden}
.court .arc{position:absolute;bottom:6%;left:50%;transform:translateX(-50%);width:76%;height:64%;border:2px solid #333845;border-bottom:none;border-radius:50% 50% 0 0/72% 72% 0 0}
.court .key{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:36%;height:44%;border:2px solid #333845;border-bottom:none;background:rgba(217,142,63,.05)}
.court .hoop{position:absolute;bottom:3%;left:50%;transform:translateX(-50%);width:13px;height:13px;border:2px solid var(--maple);border-radius:50%}
.spot{position:absolute;transform:translate(-50%,-50%);width:58px;text-align:center;cursor:pointer;z-index:2}
.spot .tok{width:46px;height:46px;border-radius:50%;margin:0 auto;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;background:var(--panel2);border:2px solid var(--line)}
.spot.sel .tok{border-color:var(--led);box-shadow:0 0 12px rgba(255,176,46,.55)}
.spot .lbl{font-size:10px;font-weight:700;color:var(--led);margin-top:2px}
.spot .pname{font-size:9px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pobr{display:flex;gap:8px;overflow-x:auto;padding:2px 0 6px}
.pocol{display:flex;flex-direction:column;justify-content:space-around;gap:6px;min-width:84px}
.pocol .rh{font-size:10px;color:var(--dim);text-align:center;font-weight:700}
.poser{background:var(--panel2);border:1px solid var(--line);border-radius:7px;overflow:hidden}
.poser .pr{display:flex;justify-content:space-between;gap:6px;align-items:center;padding:3px 6px;font-size:11px;white-space:nowrap;border-bottom:1px solid var(--line)}
.poser .pr:last-child{border-bottom:none}
.poser .pr.win{color:var(--led);font-weight:800;background:rgba(255,176,46,.07)}
.poser .pr.me{box-shadow:inset 2px 0 0 var(--blue)}
.poser .pr b{font-family:Menlo,monospace}
@media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="h-row">
      <div class="h-title" id="hTitle">夢之隊 <span class="dot">GM</span></div>
      <div class="pill" id="hSeason"></div>
    </div>
    <div class="h-sub" id="hSub"></div>
    <div class="cap-bar"><div class="cap-fill" id="capFill" style="width:0%"></div></div>
    <div id="dataSrc" style="font-size:10px;color:var(--dim);margin-top:6px"></div>
  </header>
  <main id="main"></main>
  <nav id="nav"></nav>
</div>
<script>
// 內建球員資料（離線後備）。連到本機伺服器時會被 /api/players 的真實數據覆寫。
let DB=[
["Nikola Jokic","C",29.6,12.7,10.2,1.8,0.6,57.6,51.4],
["Shai Gilgeous-Alexander","PG",32.7,5.0,6.4,1.7,1.0,51.9,38.3],

  const [,,pts,reb,ast,stl,blk,fg]=p;

}

function marketTick(){
  const all=allPlayers();
  // 隨機市場事件（玩家球員或大牌才上新聞）
  const pool=shuffle([...all]);
  for(let i=0;i<3&&i<pool.length;i++){
    const p=pool[i],e=EVT[ri(0,EVT.length-1)];
    e.f(p);
    if(S.roster.includes(p)||p.ovr>=84)S.log.unshift({type:"mkt",t:Date.now(),msg:e.ic+" "+p.name+"："+e.msg});
  }
  // 全員：狀態隨機漫步 → 身價向基準靠攏 + 日內波動
  all.forEach(p=>{
    p.form=Math.max(-8,Math.min(8,+(p.form+rnd(-1.1,1.1)-p.form*0.08).toFixed(2)));
    const tgt=mvBase(p);
    p.mv=Math.max(1.5,+(p.mv+(tgt-p.mv)*0.45+p.mv*rnd(-0.035,0.035)).toFixed(1));
    p.mvH.push(p.mv);if(p.mvH.length>21)p.mvH.shift();
  });
  // 自由球員會隨時間被其他球隊簽走／離開聯盟（OVR 越高消失越快）
  if(S.fa&&S.fa.length){
    S.fa=S.fa.filter(p=>{
      const chance=Math.min(0.5,Math.max(0.04,(p.ovr-60)/120+0.04));
      if(Math.random()<chance){if(p.ovr>=80)S.log.unshift({type:"info",t:Date.now(),msg:"📝 "+p.name+"（OVR "+p.ovr+"）被其他球隊簽走了"});return false;}
      return true;
    });
  }
  // 投資組合：我的球隊總身價走勢
  S.teamMvH=S.teamMvH||[];
  S.teamMvH.push(+payrollMv(S.roster).toFixed(1));
  if(S.teamMvH.length>21)S.teamMvH.shift();
  S.log=S.log.slice(0,30);
}

function autoStarters(r){return healthy(r).sort((a,b)=>b.ovr-a.ovr).slice(0,5).map(p=>p.id);} // 純 OVR 取前 5
function lineupOf(team,isMe){
  const r=team.roster;
  let st=isMe?(S.starters||[]).map(id=>r.find(p=>p.id===id)).filter(p=>p&&p.inj<=0):[];
  if(!isMe||st.length<5){
    const have=new Set(st.map(p=>p.id));
    const fill=healthy(r).filter(p=>!have.has(p.id)).sort((a,b)=>eff(b)-eff(a));
    while(st.length<5&&fill.length)st.push(fill.shift());
  }
  const ids=new Set(st.map(p=>p.id));
  const bench=healthy(r).filter(p=>!ids.has(p.id)).sort((a,b)=>eff(b)-eff(a)).slice(0,5);
  return{st,bench};
}

// 目前對手對位的完整指派（玩家覆寫優先，其餘就近配對）。回傳 {oppId: 我方先發物件}
function currentDefMap(opp){
  const opSt=lineupOf(opp,false).st, mySt=lineupOf({roster:S.roster},true).st;
  const map={};matchupPairs(opSt,mySt).forEach(pr=>{map[pr.off.id]=pr.def;}); // 預設一對一配對
  if(S.defOppKey!==opp.name){S.defByOpp={};S.defOppKey=opp.name;} // 換對手 → 重置手動指派
  // 驗證手動指派：必須涵蓋全部對手、值都是當前先發、且不重複（否則換過先發會殘留 → 重複球員），不合格就放棄回到預設
  if(S.defByOpp){
    const myIds=new Set(mySt.map(p=>p.id));
    const vals=opSt.map(o=>S.defByOpp[o.id]);
    const ok=vals.every(v=>v&&myIds.has(v))&&new Set(vals).size===vals.length;
    if(ok)opSt.forEach(o=>{const d=mySt.find(p=>p.id===S.defByOpp[o.id]);if(d)map[o.id]=d;});
    else S.defByOpp={}; // 不合格 → 清掉殘留指派
  }
  return {opSt,mySt,map};
}

  if(!defSel){defSel=oppId;return render();}            // 第一次點 → 選取
  const opp=nextOpponent();if(!opp){defSel=null;return render();}
  const {opSt,mySt,map}=currentDefMap(opp);
  const full={};opSt.forEach(o=>{full[o.id]=(map[o.id]||mySt[0]).id;});
  const a=full[defSel],b=full[oppId];full[defSel]=b;full[oppId]=a; // 交換兩名防守者
  S.defByOpp=full;S.defOppKey=opp.name;defSel=null;save();render();
}

    const sel=defSel===op.id;

      <span style="flex:1;text-align:left;color:${me?ovrColor(me.ovr):'var(--dim)'};font-weight:600">${me?me.name.split(' ').pop():'（空）'}${me?'<span class="muted" style="font-size:9px"> '+me.pos+'防'+(me.drtg||'-')+'</span>':''}</span>
      <span style="width:50px;text-align:center;color:${myWeak?'var(--bad)':'var(--maple)'};font-weight:700;font-size:10px">守 ${op.pos}${cross?'⚠':''}</span>
      <span style="flex:1;text-align:right;color:${ovrColor(op.ovr)};font-weight:600">${op.name.split(' ').pop()}<span class="muted" style="font-size:9px"> ${op.ovr}</span></span>
    </div>`;
  });
  return h+`<div class="muted" style="font-size:10px;margin-top:4px">${defSel?'已選取一列，點另一列即互換防守者。':'點一列選取（變亮）→ 再點另一列，兩名防守者互換。'}紅字＝守不住、⚠＝跨位置。</div></div>`;
}
// (B) 非線性才能值：高 OVR 的每一分更值錢，巨星貢獻被放大
function gameVal(p){const e=eff(p);return e+Math.pow(Math.max(0,e-84),1.4)*0.18;}
function power(team,isMe){
  const{st,bench}=lineupOf(team,isMe);
  if(st.length<5)return 0; // 可上場人數不足
  let w=0,n=0;
  st.forEach(p=>{w+=gameVal(p)*1.45;n+=1.45;});
  bench.forEach((p,i)=>{const k=[1.0,0.88,0.74,0.6,0.45][i];w+=gameVal(p)*k;n+=k;});
  let pw=w/n;
  // (A) 明星 carry 加成：全隊最強先發越強，整隊額外受益（一個超巨能扛起球隊）
  const bestEff=Math.max.apply(null,st.map(eff));
  pw+=Math.max(0,bestEff-90)*0.5;
  return pw;
}

/* 從 DB 列複製一份新球員（給選秀/球星市場用，不影響真實隊陣容） */
function clonePlayer(src){

  return {id:"c"+Date.now().toString(36)+Math.floor(Math.random()*1e9).toString(36),

/* 選秀（球星市場）：每天刷新 4 次、每次 10 名真實球員，開價隨身價浮動 → 可挖便宜大咖 */
function rollDraftOffers(){
  const have=new Set(S.roster.map(p=>p.name));
  const cand=DB.filter(r=>!have.has(r[0]));
  const offers=[],used=new Set();
  let guard=0;
  // cand 依 OVR 由高到低排序（DB 已排序）。指數<1 讓抽樣偏向「索引大＝OVR 低」，
  // 所以大咖（索引小）變稀有。數字越小、大咖越罕見（0.7 約等於偶爾出現一個球星）。
  const STAR_BIAS=0.7;
  while(offers.length<DRAFT_OFFERS&&guard++<800&&cand.length){
    const r=cand[Math.floor(Math.pow(Math.random(),STAR_BIAS)*cand.length)];
    if(!r||used.has(r[0]))continue;
    used.add(r[0]);
    const c=clonePlayer(r);initMv(c);
    // 開價：平常接近身價；但有一個隨 OVR 遞減的小機率觸發「跳樓價」(<0.8)→ 💎
    const o=c.ovr;
    const bChance=o>=90?0.05:o>=80?0.12:o>=72?0.30:0.45; // 90+ 只有 5%、80+ 12%，越低越常見
    let ask;
    if(Math.random()<bChance) ask=Math.max(2.0,+(c.mv*rnd(0.55,0.78)).toFixed(1)); // 跳樓價
    else                      ask=Math.max(2.0,+(c.mv*rnd(0.9,1.25)).toFixed(1));  // 一般開價
    c.ask=ask;c.bargain=ask<=c.mv*0.8; // 明顯低於身價 → 💎 划算
    offers.push(c);
  }
  return offers.sort((a,b)=>b.ovr-a.ovr);
}
function draftSlotStart(t){const d=new Date(t),h=d.getHours();let s=0;for(const x of DRAFT_SLOTS)if(x<=h)s=x;return new Date(d.getFullYear(),d.getMonth(),d.getDate(),s,0,0,0).getTime();}
function nextDraftSlot(t){const d=new Date(t);for(const x of DRAFT_SLOTS){const s=new Date(d.getFullYear(),d.getMonth(),d.getDate(),x,0,0,0).getTime();if(s>t)return s;}return new Date(d.getFullYear(),d.getMonth(),d.getDate()+1,DRAFT_SLOTS[0],0,0,0).getTime();}
function ensureDraft(){if(!S.draftBoard||S.draftBoard.slot==null)S.draftBoard={slot:draftSlotStart(Date.now()),manualUsed:false,offers:rollDraftOffers()};}
/* 每到 0/6/12/18 點：自動換一批新球員，並重置免費刷新 */
function draftCatchup(){
  if(!S)return false;

  const cur=draftSlotStart(Date.now());
  if(cur>S.draftBoard.slot){S.draftBoard.slot=cur;S.draftBoard.manualUsed=false;S.draftBoard.offers=rollDraftOffers();save();return true;}
  return false;
}

function buildSchedule(){
  // 31 隊（0=我隊，1..30=真實隊）循環賽程：圓桌法，奇數補一個「輪空」位
  const N=1+S.ai.length;
  const teams=[];for(let i=0;i<N;i++)teams.push(i);
  if(teams.length%2===1)teams.push(-1); // -1 = 輪空
  const m=teams.length,half=m/2,base=[];
  let arr=teams.slice();
  for(let r=0;r<m-1;r++){
    const rd=[];
    for(let k=0;k<half;k++){const a=arr[k],b=arr[m-1-k];if(a!==-1&&b!==-1)rd.push([a,b]);}
    base.push(rd);
    arr.splice(1,0,arr.pop()); // 固定首位，其餘旋轉
  }
  const rev=base.map(rd=>rd.map(([a,b])=>[b,a]));
  S.schedule=[...base,...rev]; // 雙循環，足夠打滿 REG_GAMES 場
  // 旋轉賽程，讓開季「第一輪」一定有玩家的比賽（不會一開季就輪休）
  const fi=S.schedule.findIndex(rd=>rd.some(([a,b])=>a===0||b===0));
  if(fi>0)S.schedule=[...S.schedule.slice(fi),...S.schedule.slice(0,fi)];
}
function teamOf(i){return i===0?{name:S.team,roster:S.roster,get w(){return S.w},set w(v){S.w=v},get l(){return S.l},set l(v){S.l=v}}:S.ai[i-1];}
function addW(i){i===0?S.w++:S.ai[i-1].w++;}
function addL(i){i===0?S.l++:S.ai[i-1].l++;}
function winPct(w,l){return (w+l)?w/(w+l):0;}
function confOf(idx){return idx===0?(S.conf||"E"):(S.ai[idx-1]?S.ai[idx-1].conf:"E");}
function standings(){
  const list=[{idx:0,name:S.team,w:S.w,l:S.l},...S.ai.map((t,i)=>({idx:i+1,name:t.name,w:t.w,l:t.l}))];
  return list.sort((a,b)=>winPct(b.w,b.l)-winPct(a.w,a.l)||b.w-a.w);
}
function confStandings(cf){
  const list=[];
  if((S.conf||"E")===cf)list.push({idx:0,name:S.team,w:S.w,l:S.l});
  S.ai.forEach((t,i)=>{if(t.conf===cf)list.push({idx:i+1,name:t.name,w:t.w,l:t.l});});
  return list.sort((a,b)=>winPct(b.w,b.l)-winPct(a.w,a.l)||b.w-a.w);
}

// ⚠ 測試用：每場間隔秒數。設 0 = 正式版（每天 02/08/14/20 點）。設 300 = 每 5 分鐘一場。
// 想更快可設更小（例如 10 = 每 10 秒一場，約幾分鐘就能打進季後賽）。上線前記得改回 0！
const TEST_SLOT_SEC=0;
function nextSlot(t){

/* ============ 比賽模擬 ============ */
/* ============ 逐球模擬引擎（玩家比賽用，AI 比賽用快速版） ============ */
const THREE_P={PG:0.40,SG:0.42,SF:0.36,PF:0.26,C:0.12};
const FOUL_P=0.06; // 每次出手被犯規的基準機率（再乘上球員造犯規傾向）
function ftPct(p){return Math.max(0.55,Math.min(0.92,0.74+(((p&&p.ovr)||75)-75)*0.004));} // 罰球命中率（依 OVR 微調）
function wpick(ws){let s=0;for(const w of ws)s+=w;if(s<=0)return 0;let r=Math.random()*s;for(let i=0;i<ws.length;i++){r-=ws[i];if(r<=0)return i;}return ws.length-1;}
// 防守對位（預設）：雙方先發各依「位置順序」排好，依序對位 → C對C、F對F、G對G。之後玩家可手動互換
function matchupPairs(offSt,defSt){
  const o=[...offSt].sort((a,b)=>(POS_NUM[a.pos]||3)-(POS_NUM[b.pos]||3));
  const d=[...defSt].sort((a,b)=>(POS_NUM[a.pos]||3)-(POS_NUM[b.pos]||3));
  const n=Math.min(o.length,d.length),pairs=[];
  for(let i=0;i<n;i++)pairs.push({off:o[i],def:d[i]});
  return pairs;
}
// O 進攻 → 每位先發出手者對應的防守者（D 的先發）。useMine=true 時，O=對手、D=我隊，套用玩家手動指派 S.defByOpp
function buildDefMap(O,D,useMine){
  const m={};matchupPairs(O.starters,D.starters).forEach(pr=>{m[pr.off.id]=pr.def;}); // 預設就近配對
  if(useMine&&S&&S.defByOpp){
    O.starters.forEach(op=>{const did=S.defByOpp[op.id];const d=did&&D.starters.find(x=>x.id===did);if(d)m[op.id]=d;});
  }
  return m;
}
function engRoster(team,isMe){
  const{st,bench}=lineupOf(team,isMe);
  const starters=[...st].sort((a,b)=>(POS_NUM[a.pos]||3)-(POS_NUM[b.pos]||3)); // 位置排序，對位用
  const rot=[...st,...bench.slice(0,4)];                                       // 出場輪換
  const players=rot.map((p,i)=>{
    const start=i<st.length;
    const mw=(start?1.0:0.5)*(0.55+eff(p)/130);                                // 上場時間權重
    return {p,start,mw,uw:Math.pow(Math.max(1,p.pts),0.78)*(0.5+mw),           // 使用率：場均得分為底（次方<1 避免單人壟斷球權）
            pts:0,reb:0,ast:0,stl:0,blk:0,fgm:0,fga:0,t3m:0,t3a:0,ftm:0,fta:0,tov:0,pf:0};
  });
  const byId={};players.forEach(x=>byId[x.p.id]=x);
  return {starters,players,byId};
}
function possession(O,D){
  const sh=O.players[wpick(O.players.map(x=>x.uw))];                // 出手者
  // 對位防守者：先發用就近配對表；板凳出手者用最接近位置的防守者
  let defS=O.defMap&&O.defMap[sh.p.id];
  if(!defS){const pn=POS_NUM[sh.p.pos]||3;defS=D.starters.slice().sort((a,b)=>Math.abs((POS_NUM[a.pos]||3)-pn)-Math.abs((POS_NUM[b.pos]||3)-pn))[0]||D.starters[0];}
  const defW=D.byId[defS.id]||D.players[0];
  const dDef=defS.drtg||60, dStl=defS.stl||0.8, dBlk=defS.blk||0.5;
  const shN=sh.p.name.split(' ').pop(), dN=defW.p.name.split(' ').pop();
  const oid=sh.p.id, did=defS.id; // 出手者/防守者 id
  // 失誤（含抄截）
  const tovP=Math.max(0.05,Math.min(0.20,0.11+(dStl-1)*0.015));
  if(Math.random()<tovP){sh.tov++;if(Math.random()<dStl/(dStl+2.2)){defW.stl++;return {pts:0,ev:{k:'stl',oid,did,t:dN+' 抄截 '+shN,d:{o:oid,tov:1,stl:did}}};}return {pts:0,ev:{k:'tov',oid,did,t:shN+' 失誤，球權轉換',d:{o:oid,tov:1}}};}
  const three=Math.random()<(sh.p.t3r!=null?Math.max(0.02,Math.min(0.85,sh.p.t3r)):(THREE_P[sh.p.pos]||0.30)); // 出手型態：優先用球員個人三分傾向，無資料才用位置預設
  // 命中率：自身能力 − 對位防守修正（常數可調整節奏/比分；上限壓低避免球星刷高分）
  let makeP=0.48+(eff(sh.p)-80)*0.003+((sh.p.fg||47)-47)*0.003-(dDef-62)*0.0022;
  makeP=Math.max(0.39,Math.min(0.56,makeP)); // 地板拉高、防守影響壓縮 → 避免雪崩式懸殊
  if(Math.random()<dBlk*0.025){defW.blk++;sh.fga++;if(three)sh.t3a++;return {pts:0,ev:{k:'blk',oid,did,three,t:dN+' 阻攻 '+shN+'！',d:{o:oid,fga:1,t3a:three?1:0,blk:did}}};}  // 被阻
  const fouled=Math.random()<FOUL_P*(sh.p.ftr!=null?Math.max(0.35,Math.min(3.6,Math.pow(sh.p.ftr/0.22,1.4))):1); // 出手被犯規：依造犯規傾向縮放，拉大差距讓 SGA 這類球員明顯更常上罰球線
  if(Math.random()<makeP){
    const val=three?3:2;
    sh.fga++;sh.fgm++;sh.pts+=val;if(three){sh.t3a++;sh.t3m++;}
    const d={o:oid,fga:1,fgm:1,t3a:three?1:0,t3m:three?1:0,pts:val};
    let astTxt='';
    if(!fouled&&Math.random()<0.55){const aw=O.players.map(x=>x===sh?0:Math.max(0.2,x.p.ast));const a=O.players[wpick(aw)];a.ast++;astTxt='（'+a.p.name.split(' ').pop()+' 助攻）';d.ast=a.p.id;}
    let oneTxt='';
    if(fouled){sh.fta++;const m=Math.random()<ftPct(sh.p)?1:0;sh.ftm+=m;sh.pts+=m;defW.pf++;d.fta=1;d.ftm=m;d.pts+=m;d.pf=did;oneTxt=' 加罰'+(m?'命中！':'不進');}
    return {pts:val+(d.ftm||0),ev:{k:three?'m3':'m2',off:true,oid,did,three,t:shN+(three?' 三分命中 +3':' 進球 +'+val)+astTxt+oneTxt,d}};
  }
  // 投失：若被犯規 → 罰球（不計 FGA）；否則搶籃板
  if(fouled){
    const n=three?3:2;let m=0;for(let i=0;i<n;i++)if(Math.random()<ftPct(sh.p))m++;
    sh.fta+=n;sh.ftm+=m;sh.pts+=m;defW.pf++;
    return {pts:m,ev:{k:'ft',oid,did,t:shN+' 製造犯規（'+dN+'），罰球 '+m+'/'+n+' 中',d:{o:oid,fta:n,ftm:m,pts:m,pf:did}}};
  }
  sh.fga++;if(three)sh.t3a++;
  let rebTxt,rebId;

  else{const rb=D.players[wpick(D.players.map(x=>x.p.reb*1.0))];rb.reb++;rebId=rb.p.id;rebTxt='，'+rb.p.name.split(' ').pop()+' 防守籃板';}
  return {pts:0,ev:{k:'miss',oid,did,three,t:shN+(three?' 三分不進':' 出手不進')+rebTxt,d:{o:oid,fga:1,t3a:three?1:0,reb:rebId}}};
}
function simGameDetailed(ta,tb,meIdx){
  const A=engRoster(ta,meIdx===0), B=engRoster(tb,meIdx===1);
  // 對位：玩家那一隊防守時，套用手動指派（對手進攻方向用 useMine）
  A.defMap=buildDefMap(A,B,meIdx===1);B.defMap=buildDefMap(B,A,meIdx===0);
  const nameA=ta.name||"A",nameB=tb.name||"B";
  const qa=[],qb=[],evts=[],qsum=[],pbp=[];let sa=0,sb=0;const PQ=26;
  const clk=(q,i)=>{const rem=12*(1-(i+1)/PQ);const mm=Math.floor(rem);return `Q${q+1} ${mm}:${String(Math.floor((rem-mm)*60)).padStart(2,'0')}`;};
  const add=(ev,side,q,i,c)=>{if(!ev)return;const clutch=(q===3&&i>=PQ-4);
    if(ev.k==='m3'||ev.k==='blk'||ev.k==='stl'||(clutch&&ev.off))evts.push({c,t:'【'+side+'】'+ev.t,s:sa+'-'+sb,clutch});};
  for(let q=0;q<4;q++){
    const st={};[...A.players,...B.players].forEach(x=>st[x.p.id]=x.pts);
    let x=0,y=0;
    for(let i=0;i<PQ;i++){const c=clk(q,i);
      const ra=possession(A,B);x+=ra.pts;sa+=ra.pts;add(ra.ev,nameA,q,i,c);
      if(ra.ev)pbp.push({c,sd:'A',t:ra.ev.t,k:ra.ev.k,oid:ra.ev.oid,did:ra.ev.did,z:ra.ev.three?1:0,d:ra.ev.d,sa,sb});
      const rb=possession(B,A);y+=rb.pts;sb+=rb.pts;add(rb.ev,nameB,q,i,c);
      if(rb.ev)pbp.push({c,sd:'B',t:rb.ev.t,k:rb.ev.k,oid:rb.ev.oid,did:rb.ev.did,z:rb.ev.three?1:0,d:rb.ev.d,sa,sb});}
    qa.push(x);qb.push(y);
    const qtop=T=>{let b=null,bp=0;T.players.forEach(p=>{const d=p.pts-(st[p.p.id]||0);if(d>bp){bp=d;b=p;}});return b?b.p.name.split(' ').pop()+' '+bp+'分':'-';};
    qsum.push(`Q${q+1}　${nameA} ${x} : ${y} ${nameB}　本節最佳 ${qtop(A)}／${qtop(B)}`);
  }
  let g=0;while(sa===sb&&g++<6){let x=0,y=0;for(let i=0;i<8;i++){const c='OT '+(8-i);const ra=possession(A,B);x+=ra.pts;sa+=ra.pts;if(ra.ev)pbp.push({c,sd:'A',t:ra.ev.t,k:ra.ev.k,oid:ra.ev.oid,did:ra.ev.did,z:ra.ev.three?1:0,d:ra.ev.d,sa,sb});const rb=possession(B,A);y+=rb.pts;sb+=rb.pts;if(rb.ev)pbp.push({c,sd:'B',t:rb.ev.t,k:rb.ev.k,oid:rb.ev.oid,did:rb.ev.did,z:rb.ev.three?1:0,d:rb.ev.d,sa,sb});}qa.push(x);qb.push(y);}
  // 精華太多 → 保留 clutch、其餘平均抽樣到 ~22 條
  let hi=evts;
  if(evts.length>22){const keep=evts.filter(e=>e.clutch),rest=evts.filter(e=>!e.clutch),step=Math.max(1,Math.ceil(rest.length/Math.max(1,22-keep.length))),samp=rest.filter((_,k)=>k%step===0);hi=evts.filter(e=>keep.indexOf(e)>=0||samp.indexOf(e)>=0);}
  const mkBox=T=>T.players.map(x=>({n:x.p.name,pos:x.p.pos,ovr:x.p.ovr,start:x.start,
    min:x.start?ri(30,38):ri(10,22),pts:x.pts,reb:x.reb,ast:x.ast,stl:x.stl,blk:x.blk,
    fgm:x.fgm,fga:x.fga,t3m:x.t3m,t3a:x.t3a,ftm:x.ftm,fta:x.fta,tov:x.tov,pf:x.pf,
    fg:x.fga?+(x.fgm/x.fga*100).toFixed(1):0})).sort((a,b)=>b.pts-a.pts);
  // 本場防守對位：玩家方防守者 → 守 → 對手（依對手位置排序）
  const oppR=meIdx===0?B:A, myR=meIdx===0?A:B; // oppR.defMap 把對手出手者對到我方防守者
  const matchup=[...oppR.starters].sort((a,b)=>(POS_NUM[a.pos]||3)-(POS_NUM[b.pos]||3)).map(op=>{
    const d=oppR.defMap[op.id];
    return {oppN:op.name.split(' ').pop(),oppPos:op.pos,oppOvr:op.ovr,
            meN:d?d.name.split(' ').pop():'-',mePos:d?d.pos:'',meDr:d?(d.drtg||'-'):''};
  });
  const lineOf=R=>R.players.map(x=>({id:x.p.id,n:x.p.name.split(' ').pop(),pos:x.p.pos,pid:x.p.pid||0,ovr:x.p.ovr,st:x.start}));
  return {sa,sb,qa,qb,boxA:mkBox(A),boxB:mkBox(B),evts:hi,qsum,matchup,myName:myR.name,pbp,nA:nameA,nB:nameB,myIsA:meIdx===0,lineA:lineOf(A),lineB:lineOf(B)};
}
function simGame(ta,tb,meIdx){
  const pa=power(ta,meIdx===0)||50,pb=power(tb,meIdx===1)||50;
  const qa=[],qb=[];let sa=0,sb=0;
  for(let q=0;q<4;q++){
    let x=Math.round(23+(pa-80)*0.45+rnd(-6,6)),y=Math.round(23+(pb-80)*0.45+rnd(-6,6));
    x=Math.max(12,x);y=Math.max(12,y);qa.push(x);qb.push(y);sa+=x;sb+=y;
  }
  while(sa===sb){const x=ri(8,14),y=ri(8,14);if(x!==y){qa.push(x);qb.push(y);sa+=x;sb+=y;}}
  return{sa,sb,qa,qb,boxA:box(ta,meIdx===0,sa),boxB:box(tb,meIdx===1,sb)};
}
function box(team,isMe,total){
  const{st,bench}=lineupOf(team,isMe);
  const ps=[...st,...bench];
  const wts=ps.map(p=>Math.pow(Math.max(1,eff(p)-58),1.6)*rnd(0.7,1.3)),sum=wts.reduce((a,b)=>a+b,0)||1;
  return ps.map((p,i)=>{
    const starter=i<5;
    return {n:p.name,pos:p.pos,ovr:p.ovr,start:starter,
      min:starter?ri(28,38):ri(8,22),
      pts:Math.round(total*wts[i]/sum),
      reb:Math.max(0,Math.round(p.reb*rnd(0.6,1.5))),
      ast:Math.max(0,Math.round(p.ast*rnd(0.6,1.5))),
      stl:Math.max(0,Math.round(p.stl*rnd(0.4,1.8))),
      blk:Math.max(0,Math.round(p.blk*rnd(0.4,1.8))),
      fg:+(p.fg+rnd(-8,8)).toFixed(1)};
  }).sort((a,b)=>b.pts-a.pts);
}
function applyFatigueInjury(team,isMe,win){
  const{st,bench}=lineupOf(team,isMe);const injured=[];
  [...st,...bench].forEach((p,i)=>{
    p.sta=Math.max(0,p.sta-(i<5?15:8));
    p.form=Math.max(-8,Math.min(8,(p.form||0)+(win?0.25:-0.25)));
    if(Math.random()<0.018){p.inj=ri(3,10);p.form=Math.max(-8,(p.form||0)-2);
      injured.push({name:p.name,games:p.inj,team:team.name||"",isMe});
      if(isMe){S.log.unshift({type:"inj",t:Date.now(),msg:p.name+" 受傷，預計缺席 "+p.inj+" 場"});}}
  });
  return injured;
}
function recoverAll(){
  const all=[S.roster,...S.ai.map(t=>t.roster),S.fa];
  all.forEach(r=>r.forEach(p=>{p.sta=Math.min(100,p.sta+12);if(p.inj>0)p.inj--;}));
}

/* ============ 放置時鐘：補算所有到期場次 ============ */
function tick(){
  if(!S||!S.nextAt)return false;
  let played=false,guard=0;
  while(S.nextAt&&Date.now()>=S.nextAt&&guard++<400){
    recoverAll();
    if(S.phase==="regular")playRegularRound();
    else if(S.phase==="playoffs")playPlayoffSlot();
    // 玩家出局（沒進季後賽或被淘汰）→ 立即快轉跑完季後賽、產生冠軍、進休賽期
    if(S.phase==="playoffs"&&S.po&&S.po.meOut){let g=0;while(S.phase==="playoffs"&&g++<800)playPlayoffSlot();}
    if(S.nextAt)S.nextAt=nextSlot(S.nextAt);
    played=true;
  }
  if(played){S.unseen=true;save();}
  return played;
}
/* 測試用：不管時間，立即推進一個時段 */
function _testStep(){
  if(!S||!S.nextAt||(S.phase!=="regular"&&S.phase!=="playoffs"))return false;
  recoverAll();
  if(S.phase==="regular")playRegularRound();
  else if(S.phase==="playoffs")playPlayoffSlot();
  if(S.phase==="playoffs"&&S.po&&S.po.meOut){let g=0;while(S.phase==="playoffs"&&g++<800)playPlayoffSlot();}
  if(S.nextAt)S.nextAt=nextSlot(S.nextAt);
  return true;
}
function testPlay(n){let c=0;for(let i=0;i<n;i++){if(!_testStep())break;c++;}if(c){S.unseen=true;save();}render();toast(c?("已模擬 "+c+" 個時段"):"現在沒有可進行的比賽");}
/* 其餘 29 隊互打：用戰力快速判勝負（不產生詳細數據，效能佳） */
function quickWin(A,B){
  const pa=power(A,false)||50,pb=power(B,false)||50;
  let sa=0,sb=0;
  for(let q=0;q<4;q++){sa+=Math.max(12,23+(pa-80)*0.45+rnd(-6,6));sb+=Math.max(12,23+(pb-80)*0.45+rnd(-6,6));}
  return sa===sb?Math.random()<0.5:sa>sb;
}
// 只在最近 3 場保留逐球紀錄（pbp），舊的清掉避免存檔膨脹
function trimPbp(){(S.gameHist||[]).forEach((r,i)=>{if(i>=3&&r.g&&r.g.pbp)r.g.pbp=null;});}
function playRegularRound(){
  const rd=S.schedule[S.round%S.schedule.length];
  rd.forEach(([a,b])=>{
    if(a===0||b===0){
      const A=teamOf(a),B=teamOf(b);
      if(a===0&&!legalMe()){addL(0);addW(b);S.log.unshift({type:"forfeit",t:Date.now(),msg:"陣容不足或超帽，本場棄賽判負 vs "+B.name});return;}
      if(b===0&&!legalMe()){addL(0);addW(a);S.log.unshift({type:"forfeit",t:Date.now(),msg:"陣容不足或超帽，本場棄賽判負 vs "+A.name});return;}
      const g=simGameDetailed(A,B,a===0?0:1); // 玩家比賽 → 逐球引擎
      if(g.sa>g.sb){addW(a);addL(b);}else{addW(b);addL(a);}
      g.injuries=[...applyFatigueInjury(A,a===0,g.sa>g.sb),...applyFatigueInjury(B,b===0,g.sb>g.sa)];
      const me=a===0,win=me?g.sa>g.sb:g.sb>g.sa;
      const rec={a:A.name,b:B.name,g,meA:me,when:S.nextAt,label:"例行賽 第"+(S.w+S.l+1)+"場",win,
                 my:me?g.sa:g.sb,op:me?g.sb:g.sa,opp:me?B.name:A.name};
      S.lastGame=rec;
      S.gameHist.unshift(rec);S.gameHist=S.gameHist.slice(0,40);trimPbp();
      S.log.unshift({type:"game",t:S.nextAt,win,my:rec.my,op:rec.op,opp:rec.opp,label:(S.w+S.l)+"場"});
    }else{
      const A=teamOf(a),B=teamOf(b);
      if(quickWin(A,B)){addW(a);addL(b);}else{addW(b);addL(a);}
    }
  });
  S.log=S.log.slice(0,30);
  S.round++;
  if(S.w+S.l>=REG_GAMES)startPlayoffs();
}
function legalMe(){return S.roster.length>=MIN_R&&(TEST_SLOT_SEC>0||payroll(S.roster)<=CAP)&&healthy(S.roster).length>=5;}

/* ============ 季後賽：前 16 強 + Play-in（系列賽三戰兩勝、Play-in 單場） ============ */
function mkSeries(a,b,target){return{a,b,wa:0,wb:0,hist:[],target:target||2};}
function snapSeries(s){return{a:s.a,b:s.b,wa:s.wa,wb:s.wb,target:s.target};}
function seriesDone(s){return s.wa>=s.target||s.wb>=s.target;}
function seriesWinner(s){return s.wa>=s.target?s.a:s.b;}
function seriesLoser(s){return s.wa>=s.target?s.b:s.a;}
function confRoundName(n){return ({8:"分區8強",4:"分區4強",2:"分區冠軍賽"})[n]||("分區"+n+"強");}
function buildBracket(seeds){const n=seeds.length,s=[];for(let i=0;i<n/2;i++)s.push(mkSeries(seeds[i],seeds[n-1-i],4));return s;}
function nextRound(winners){const s=[];for(let i=0;i<winners.length;i+=2)s.push(mkSeries(winners[i],winners[i+1],4));return s;}
function mkConfPO(cf){
  const st=confStandings(cf);
  const auto=st.slice(0,6).map(t=>t.idx);   // 1–6 種子直接晉級
  const pi=st.slice(6,10).map(t=>t.idx);    // 7–10 種子打 Play-in
  return {cf,stage:"playin",auto,pi,pin:{g1:mkSeries(pi[0],pi[1],1),g2:mkSeries(pi[2],pi[3],1),g3:null},
          round:null,roundName:"Play-in",history:[],champ:null};
}
function startPlayoffs(){
  S.phase="playoffs";
  S.po={E:mkConfPO("E"),W:mkConfPO("W"),finals:null,meOut:false,done:false};
  const myCf=S.conf||"E";
  const top10=confStandings(myCf).slice(0,10).map(t=>t.idx);
  S.po.meOut=!top10.includes(0); // 自己分區排不進前 10 → 出局
  if(S.po.meOut)S.log.unshift({type:"info",t:Date.now(),msg:"本季無緣季後賽，快轉至總冠軍出爐後重整旗鼓"});
  else S.log.unshift({type:"info",t:Date.now(),msg:"例行賽結束！東西區季後賽開打（各區 7–10 名先打 Play-in）"});
}
function playSeriesGame(s,roundLabel){
  if(seriesDone(s))return;
  const A=teamOf(s.a),B=teamOf(s.b),me=(s.a===0||s.b===0);
  if(!me){ // AI 對 AI：快速判勝負，不跑逐球引擎（效能）
    if(quickWin(A,B))s.wa++;else s.wb++;
    return;
  }
  const g=simGameDetailed(A,B,s.a===0?0:1);
  if(g.sa>g.sb)s.wa++;else s.wb++;
  s.hist.push({sa:g.sa,sb:g.sb});
  g.injuries=[...applyFatigueInjury(A,s.a===0,g.sa>g.sb),...applyFatigueInjury(B,s.b===0,g.sb>g.sa)];
  if(s.a===0||s.b===0){
    const me=s.a===0,win=me?g.sa>g.sb:g.sb>g.sa;
    const rec={a:A.name,b:B.name,g,meA:me,when:S.nextAt,label:"季後賽 "+roundLabel,win,
               my:me?g.sa:g.sb,op:me?g.sb:g.sa,opp:me?B.name:A.name};
    S.lastGame=rec;S.gameHist.unshift(rec);S.gameHist=S.gameHist.slice(0,40);trimPbp();
    S.log.unshift({type:"game",t:S.nextAt,win,my:rec.my,op:rec.op,opp:rec.opp,label:roundLabel});
  }
}
// 推進單一分區一個時段；玩家被淘汰時設 S.po.meOut
function advanceConf(cf){
  if(cf.stage==="done")return;
  const lostMe=s=>s&&seriesDone(s)&&seriesLoser(s)===0;
  if(cf.stage==="playin"){
    const pn=cf.pin;
    playSeriesGame(pn.g1,"Play-in");playSeriesGame(pn.g2,"Play-in");
    if(lostMe(pn.g2))S.po.meOut=true;
    if(!pn.g3){
      if(seriesDone(pn.g1)&&seriesDone(pn.g2))pn.g3=mkSeries(seriesLoser(pn.g1),seriesWinner(pn.g2),1);
    }else{
      playSeriesGame(pn.g3,"Play-in");
      if(lostMe(pn.g3))S.po.meOut=true;
      if(seriesDone(pn.g3)){
        cf.history.push({name:"Play-in",series:[snapSeries(pn.g1),snapSeries(pn.g2),snapSeries(pn.g3)]});
        const seeds=[...cf.auto,seriesWinner(pn.g1),seriesWinner(pn.g3)]; // 8 隊
        cf.stage="bracket";cf.round=buildBracket(seeds);cf.roundName=confRoundName(8);
      }
    }
    return;
  }
  cf.round.forEach(s=>playSeriesGame(s,cf.roundName));
  cf.round.forEach(s=>{if(lostMe(s))S.po.meOut=true;});
  if(cf.round.every(seriesDone)){
    cf.history.push({name:cf.roundName,series:cf.round.map(snapSeries)});
    const winners=cf.round.map(seriesWinner);
    if(winners.length===1){cf.champ=winners[0];cf.stage="done";}
    else{cf.round=nextRound(winners);cf.roundName=confRoundName(winners.length);}
  }
}
function playPlayoffSlot(){
  const po=S.po;
  if(po.E.stage!=="done"||po.W.stage!=="done"){advanceConf(po.E);advanceConf(po.W);return;}
  // 兩區冠軍出爐 → 總冠軍賽（三戰兩勝）
  if(!po.finals){
    po.finals=mkSeries(po.E.champ,po.W.champ,4);
    S.log.unshift({type:"info",t:Date.now(),msg:"🏆 總冠軍賽："+teamOf(po.E.champ).name+"（東）vs "+teamOf(po.W.champ).name+"（西）"});
    return;
  }
  playSeriesGame(po.finals,"總冠軍賽");
  if(seriesDone(po.finals)){
    const c=seriesWinner(po.finals);po.done=true;
    S.champs.push({season:S.season,name:teamOf(c).name,mine:c===0});
    S.log.unshift({type:"info",t:Date.now(),msg:"🏆 第 "+S.season+" 季總冠軍："+teamOf(c).name+(c===0?"（就是你！）":"")});
    startOffseason();
  }
}

/* ============ 休賽期：成長 → 合約 → 選秀 ============ */
function startOffseason(){
  S.phase="offseason";S.po=null;S.nextAt=null; // 暫停時鐘，等玩家處理
  // 新秀成長
  const grow=p=>{if(p.pot&&p.ovr<p.pot){const g=Math.min(p.pot-p.ovr,ri(2,5));p.ovr+=g;p.pts=+(p.pts+g*0.25).toFixed(1);}};
  [S.roster,...S.ai.map(t=>t.roster),S.fa].forEach(r=>r.forEach(grow));
  // 合約年限 -1
  const expMine=[];
  const dec=(r,mine)=>{r.forEach(p=>{p.yrs--;if(p.yrs<=0&&mine)expMine.push(p.id);});};
  dec(S.roster,true);S.ai.forEach(t=>dec(t.roster,false));
  // AI 真實隊一律續約到期球員，維持真實陣容完整（不受薪資帽裁員）
  S.ai.forEach(t=>{
    t.roster.filter(p=>p.yrs<=0).forEach(p=>{p.sal=marketSal(p);p.yrs=ri(2,3);});
  });
  S.resign=expMine.length?{ids:expMine}:null;
  // 選秀池
  const order=standings().map(t=>t.idx).reverse();
  S.draft={order,pool:genRookies(12),pick:0,done:[]};
  S.draft.pool.forEach(initMv);
  // 體力與傷勢重置
  [S.roster,...S.ai.map(t=>t.roster),S.fa].forEach(r=>r.forEach(p=>{p.sta=100;p.inj=0;}));
  S.fa.sort((a,b)=>b.ovr-a.ovr);
}
function resignDecide(id,keep){
  const p=S.roster.find(x=>x.id===id);if(!p)return;
  const ns=marketSal(p);
  if(keep){
    if(payroll(S.roster)-p.sal+ns>CAP)return toast("續約後將超帽（新約 $"+ns+"M）");
    p.sal=ns;p.yrs=ri(2,3);toast("與 "+p.name+" 續約 $"+ns+"M");
  }else{
    S.roster.splice(S.roster.indexOf(p),1);p.sal=ns;p.yrs=0;S.fa.push(p);S.fa.sort((a,b)=>b.ovr-a.ovr);
    toast(p.name+" 成為自由球員");
  }
  S.resign.ids=S.resign.ids.filter(x=>x!==id);
  if(!S.resign.ids.length)S.resign=null;
  save();render();
}
/* --- 選秀 --- */
const FN=["Jaxon","Malik","Tyrese","Caleb","Darius","Zion","Kobe","Andre","Jalen","Marcus","Trey","Elijah","DeAndre","Isaiah","Quentin","Rashad"];
const LN=["Whitfield","Brooks","Sterling","Hayes","Vance","Okafor","Mercer","Donnelly","Kingsley","Battle","Crawford","Lemons","Achebe","Strand","Pruitt","Navarro"];
function genRookies(n){
  const arr=[];
  for(let i=0;i<n;i++){
    const ovr=Math.max(70,Math.round(84-i*1.1+rnd(-2,2)));
    S.rookieN++;
    arr.push({id:"r"+S.season+"_"+i,name:FN[ri(0,FN.length-1)]+" "+LN[ri(0,LN.length-1)],
      pos:["PG","SG","SF","PF","C"][ri(0,4)],
      pts:+(ovr*0.22+rnd(-2,2)).toFixed(1),reb:+rnd(2,7).toFixed(1),ast:+rnd(1,5).toFixed(1),
      stl:+rnd(0.4,1.4).toFixed(1),blk:+rnd(0.2,1.2).toFixed(1),fg:+rnd(42,50).toFixed(1),
      sal:+(9-i*0.45).toFixed(1),ovr,drtg:Math.max(40,Math.min(80,ovr-6+ri(-6,6))),pot:Math.min(99,ovr+ri(3,12)),sta:100,inj:0,yrs:3,form:0,mv:0,mvH:[]});
  }
  return arr;
}
function draftAdvance(userPickId){
  const d=S.draft;
  while(d&&d.pick<d.order.length&&d.pool.length){
    const ti=d.order[d.pick];
    if(ti===0){
      if(!userPickId){save();render();return;}
      const i=d.pool.findIndex(p=>p.id===userPickId);const p=d.pool[i];
      if(payroll(S.roster)+p.sal>CAP)return toast("簽下他會超過薪資帽");
      if(S.roster.length>=MAX_R)return toast("名單已滿 13 人");
      d.pool.splice(i,1);S.roster.push(p);d.done.push({pk:d.pick+1,team:S.team,p});
      userPickId=null;
    }else{
      const t=S.ai[ti-1];const p=d.pool.shift();
      if(t.roster.length<MAX_R&&payroll(t.roster)+p.sal<=CAP){t.roster.push(p);}
      else S.fa.push(p);
      d.done.push({pk:d.pick+1,team:t.name,p});
    }
    d.pick++;
  }
  S.fa.push(...d.pool);S.fa.sort((a,b)=>b.ovr-a.ovr);
  S.draft=null;save();render();
}
function skipPick(){const d=S.draft;d.done.push({pk:d.pick+1,team:S.team,p:null});d.pick++;draftAdvance(null);}
function startNewSeason(){
  if(S.resign)return toast("先處理完到期合約");
  if(S.draft)return toast("先完成選秀");
  if(S.roster.length<MIN_R)return toast("陣容不足 "+MIN_R+" 人，先去市場補人");
  if(payroll(S.roster)>CAP)return toast("薪資超帽，先處理陣容");
  // AI 真實隊只補足深度（不足就補角色球員），不做超帽裁員，維持真實陣容
  S.ai.forEach(t=>{if(t.roster.length<MIN_R)t.roster=t.roster.concat(genRoles(MIN_R-t.roster.length));});
  S.fa.sort((a,b)=>b.ovr-a.ovr);
  S.season++;S.round=0;S.w=0;S.l=0;S.ai.forEach(t=>{t.w=0;t.l=0;});
  S.starters=autoStarters(S.roster);
  buildSchedule();S.phase="regular";S.nextAt=nextSlot(Date.now());
  S.draftBoard={slot:draftSlotStart(Date.now()),manualUsed:false,offers:rollDraftOffers()};
  save();render();toast("第 "+S.season+" 季開打！");
}

/* ============ 簽約 / 釋出 / 交易 ============ */
function sign(id){
  if(S.phase==="playoffs")return toast("季後賽期間禁止簽約");
  // 先找選秀開價球員（用開價簽），再找自由球員
  let p=null,from=null,oi=-1;
  if(S.draftBoard){oi=S.draftBoard.offers.findIndex(x=>x.id===id);if(oi>=0){p=S.draftBoard.offers[oi];from="draft";}}
  if(!p){oi=S.fa.findIndex(x=>x.id===id);if(oi>=0){p=S.fa[oi];from="fa";}}
  if(!p)return;
  if(S.roster.some(x=>x.name===p.name))return toast("你已經有 "+p.name+" 了");
  const price=from==="draft"?(p.ask||p.sal):p.sal;
  if(S.roster.length>=MAX_R)return toast("名單已滿 "+MAX_R+" 人");
  if(payroll(S.roster)+price>CAP)return toast("超過薪資帽 $"+CAP+"M（剩餘 $"+(CAP-payroll(S.roster)).toFixed(1)+"M）");
  p.sal=price;p.yrs=Math.max(p.yrs||0,2);delete p.ask;delete p.bargain;
  if(from==="draft")S.draftBoard.offers.splice(oi,1);else S.fa.splice(oi,1);
  S.roster.push(p);initMv(p);
  if(!S.starters||S.starters.length<5)S.starters=autoStarters(S.roster);
  save();render();toast("已簽下 "+p.name+"（$"+price+"M）");
}
function release(id){
  const i=S.roster.findIndex(p=>p.id===id);const p=S.roster[i];
  S.roster.splice(i,1);S.fa.push(p);S.fa.sort((a,b)=>b.ovr-a.ovr);
  S.starters=(S.starters||[]).filter(x=>x!==id);
  save();render();toast("已釋出 "+p.name);
}
function evalTrade(){
  const t=S.ai[tradeSel.team];
  const mine=S.roster.filter(p=>tradeSel.mine.includes(p.id));
  const theirs=t.roster.filter(p=>tradeSel.theirs.includes(p.id));
  if(!mine.length||!theirs.length)return{ok:false,msg:"雙方都要選至少 1 名球員"};
  const myNew=S.roster.length-mine.length+theirs.length;
  const aiNew=t.roster.length-theirs.length+mine.length;
  if(myNew<MIN_R||myNew>MAX_R)return{ok:false,msg:"交易後你的名單須維持 "+MIN_R+"–"+MAX_R+" 人"};
  if(aiNew<MIN_R||aiNew>MAX_R)return{ok:false,msg:"交易後對方名單須維持 "+MIN_R+"–"+MAX_R+" 人"};
  // 只有玩家受薪資帽限制；真實隊可超帽（符合真實 NBA 的鳥權等規則）
  const myPay=payroll(S.roster)-payroll(mine)+payroll(theirs);
  if(myPay>CAP)return{ok:false,msg:"交易後你將超過薪資帽（$"+myPay.toFixed(1)+"M）"};
  const gain=mine.reduce((s,p)=>s+val(p),0)-theirs.reduce((s,p)=>s+val(p),0);
  const need=-theirs.reduce((s,p)=>s+val(p),0)*0.04;
  return{ok:true,accept:gain>=need,gain};
}
function proposeTrade(){
  if(S.phase==="playoffs")return toast("季後賽期間禁止交易");
  const r=evalTrade();
  if(!r.ok)return toast(r.msg);
  const t=S.ai[tradeSel.team];
  if(!r.accept)return toast(t.name+"拒絕了：他們覺得虧太多");
  const mine=S.roster.filter(p=>tradeSel.mine.includes(p.id));
  const theirs=t.roster.filter(p=>tradeSel.theirs.includes(p.id));
  S.roster=S.roster.filter(p=>!tradeSel.mine.includes(p.id)).concat(theirs);
  t.roster=t.roster.filter(p=>!tradeSel.theirs.includes(p.id)).concat(mine);
  S.starters=(S.starters||[]).filter(id=>S.roster.some(p=>p.id===id));
  tradeSel={team:tradeSel.team,mine:[],theirs:[]};
  save();render();toast("交易成立！"+t.name+"同意了");
}

    const _cf={};NBA_TEAMS.forEach(t=>_cf[t.abbr]=t.cf);

    if(S.po&&!S.po.E){S.po=null;if(S.phase==="playoffs"){S.phase="regular";S.nextAt=nextSlot(Date.now());}}
    // 依姓名從最新 DB 刷新真實球員：場均數據 + 位置 + OVR + 防守力 + 頭像（每天更新會即時反映；薪資維持簽約）
    const _byName={};DB.forEach(r=>{_byName[r[0]]=r;});

      if(r){p.pts=r[2];p.reb=r[3];p.ast=r[4];p.stl=r[5];p.blk=r[6];p.fg=r[7];
        if(r[1])p.pos=r[1];if(r[10]!=null)p.ovr=r[10];if(r[11]!=null)p.drtg=r[11];if(r[12])p.pid=r[12];if(r[13]!=null)p.t3r=r[13];if(r[14]!=null)p.ftr=r[14];if(!p.team)p.team=r[9]||"";}
      if(p.drtg==null)p.drtg=60;};
    allPlayers().forEach(_fix);
    if(S.draft&&S.draft.pool)S.draft.pool.forEach(_fix);
    allPlayers().forEach(initMv);
    if(S.draft&&S.draft.pool)S.draft.pool.forEach(initMv);
  }
}
let syncing=false;
async function syncReal(){
  if(syncing)return;
  if(Date.now()-(S.lastSync||0)<20*3600*1000)return toast("真實行情每天只能同步一次");
  syncing=true;render();
  try{

    });

    const clean=text.replace(/```json|```/g,"").trim();

      p.mv=Math.max(1.5,+(p.mv*(1+t*0.035)).toFixed(1));

      hit++;
    });
    S.lastSync=Date.now();S.log=S.log.slice(0,30);
    save();toast(hit?"已同步真實行情，"+hit+" 名球員身價變動":"同步完成，近期沒有明顯變動");
  }catch(e){toast("同步失敗，稍後再試（需要網路）");}
  syncing=false;render();
}

function sparkline(arr,w,h){

}

// 賽後快報：依比分與數據自動生成多行新聞（同一場固定、不同場有變化）
function genRecap(L){
  const g=L.g,sa=g.sa,sb=g.sb,winA=sa>=sb,wN=winA?L.a:L.b,lN=winA?L.b:L.a;
  const ws=Math.max(sa,sb),ls=Math.min(sa,sb),mg=ws-ls,ot=(g.qa&&g.qa.length>4);
  const wBox=winA?g.boxA:g.boxB,lBox=winA?g.boxB:g.boxA;
  const sh=n=>(n||'').split(' ').pop();
  const sorted=b=>(b||[]).slice().sort((x,y)=>y.pts-x.pts);
  const wTop=sorted(wBox),lTop=sorted(lBox);
  const wt=wTop[0]||{n:'-',pts:0,reb:0,ast:0,stl:0,blk:0},lt=lTop[0]||{n:'-',pts:0};
  let seed=(((L.when||0)/1000|0)+sa*131+sb*17+(wt.pts||0)*7+(lt.pts||0)*3)>>>0;
  const rng=()=>{seed=(seed+0x6D2B79F5)>>>0;let t=Math.imul(seed^(seed>>>15),1|seed);t=(t+Math.imul(t^(t>>>7),61|t))^t;return ((t^(t>>>14))>>>0)/4294967296;};
  const pick=a=>a[Math.floor(rng()*a.length)];
  const ddN=p=>[p.pts>=10,p.reb>=10,p.ast>=10].filter(Boolean).length;
  const all=(g.boxA||[]).concat(g.boxB||[]);
  const trip=all.find(p=>p.pts>=10&&p.reb>=10&&p.ast>=10);
  const lines=[];
  // 標題
  const verb=mg>=28?pick(['血洗','痛宰','屠殺']):mg>=18?pick(['輕取','大勝','狂掃']):mg>=9?pick(['擊敗','力克','擊退']):pick(['險勝','驚險擊退','頑強守住戰勝']);
  lines.push(`${wN} ${ws}-${ls}${ot?'（延長賽）':''} ${verb} ${lN}`);
  // 主將／大三元
  if(trip&&trip.pts===wt.pts){
    lines.push(`${sh(wt.n)} ${pick(['無所不能','一人宰制全場','打出 MVP 級表現'])}，寫下 ${wt.pts} 分 ${wt.reb} 籃板 ${wt.ast} 助攻的大三元！`);
  }else{
    const ex=[];if(wt.reb>=6)ex.push(wt.reb+' 籃板');if(wt.ast>=5)ex.push(wt.ast+' 助攻');if(wt.stl>=3)ex.push(wt.stl+' 抄截');if(wt.blk>=3)ex.push(wt.blk+' 阻攻');
    let s2=`${sh(wt.n)} ${pick(['火力全開','手感火燙','獨挑大樑','全場最佳'])}，攻下全隊最高 ${wt.pts} 分`;
    if(ex.length)s2+='，外帶 '+ex.slice(0,2).join('、');
    s2+=ddN(wt)>=2?pick(['，繳出大號兩雙。','，打出全能身手。']):pick(['，是贏球頭號功臣。','，扛起球隊進攻。']);
    lines.push(s2);
    if(trip&&trip!==wt)lines.push(`${sh(trip.n)} 更猛刷 ${trip.pts} 分 ${trip.reb} 籃板 ${trip.ast} 助攻寫下大三元！`);
  }
  // 先發上雙人數／第二得分手
  const dblW=(wBox||[]).filter(b=>b.start&&b.pts>=10).length;
  if(dblW>=3)lines.push(`${wN} 先發有 ${dblW} 人得分上雙，${pick(['多點開花讓對手難以招架。','火力全面開花。','板凳主力齊發揮。'])}`);
  else if(wTop[1]&&wTop[1].pts>=15)lines.push(`${sh(wTop[1].n)} 也挹注 ${wTop[1].pts} 分${wTop[1].ast>=5?'、'+wTop[1].ast+' 助攻':''}火力支援。`);
  // 三分熱手
  const hot=all.filter(p=>p.t3m>=4).sort((a,b)=>b.t3m-a.t3m)[0];
  if(hot&&rng()<0.85)lines.push(`${sh(hot.n)} 外線手感發燙，單場命中 ${hot.t3m} 記三分。`);
  // 關鍵球（接近比分時，從精華挑一顆 clutch 進球）
  if(mg<=8&&g.evts&&g.evts.length){const cl=g.evts.filter(e=>e.clutch&&/命中|進球|\+/.test(e.t));if(cl.length)lines.push(`${pick(['關鍵時刻','讀秒階段','勝負關頭'])}，${pick(cl).t.replace(/^【.*?】/,'')}，一擊定生死。`);}
  // 敗方
  lines.push(mg<=5?pick([`${lN} 鏖戰到最後一刻，${sh(lt.n)} 獨拿 ${lt.pts} 分仍功虧一簣。`,`${lN} 雖緊咬比分，${sh(lt.n)} 的 ${lt.pts} 分難挽敗局。`])
                  :pick([`${lN} 雖有 ${sh(lt.n)} 的 ${lt.pts} 分苦撐，火力仍不敵對手。`,`${lN} 全隊表現低迷，${sh(lt.n)} 的 ${lt.pts} 分孤掌難鳴。`]));
  // 傷兵

function watchGame(idx){

  const tbl=(name,list,mine,scId)=>`<div class="lbx-head ${mine?'mine':''}">${mine?'★ ':''}${name}<span class="lbx-sc" id="${scId}">0</span></div>
    <div class="lbx-wrap"><table class="lbx"><thead>${hdr}</thead><tbody>${list.map(rowH).join("")}</tbody></table></div>`;

  bg.innerHTML=`<div class="modal">

        <div class="sb-team"><div class="sb-name" style="color:${myIsA?'var(--led)':'var(--ink)'}">${myIsA?'★':''}${nA}</div><div class="sb-score" id="wsa">0</div></div>
        <div class="sb-vs" style="color:var(--good)">● LIVE</div>
        <div class="sb-team"><div class="sb-name" style="color:${!myIsA?'var(--led)':'var(--ink)'}">${!myIsA?'★':''}${nB}</div><div class="sb-score" id="wsb">0</div></div>
      </div>
    </div>
    <div class="wcap" id="wcap">點擊播放，數據即時累計</div>
    ${tbl(nA,LA,myIsA,'lscA')}

    <div id="wlog" class="watchlog short"></div>

  document.body.appendChild(bg);

  const trById={};bg.querySelectorAll(".lbx tbody tr").forEach(tr=>trById[tr.dataset.id]=tr);
  function paintRow(id){const tr=trById[id];if(!tr)return;const s=stat[id],c=tr.children;c[1].textContent=s.pts;c[2].textContent=s.reb;c[3].textContent=s.ast;c[4].textContent=s.fgm+'-'+s.fga;c[5].textContent=s.t3m+'-'+s.t3a;c[6].textContent=s.ftm+'-'+s.fta;c[7].textContent=s.stl;c[8].textContent=s.blk;c[9].textContent=s.tov;c[10].textContent=s.pf;}
  function applyD(d){if(!d)return;const o=stat[d.o];if(o){if(d.fga)o.fga+=d.fga;if(d.fgm)o.fgm+=d.fgm;if(d.t3a)o.t3a+=d.t3a;if(d.t3m)o.t3m+=d.t3m;if(d.fta)o.fta+=d.fta;if(d.ftm)o.ftm+=d.ftm;if(d.pts)o.pts+=d.pts;if(d.tov)o.tov+=d.tov;}if(d.ast&&stat[d.ast])stat[d.ast].ast++;if(d.reb&&stat[d.reb])stat[d.reb].reb++;if(d.stl&&stat[d.stl])stat[d.stl].stl++;if(d.blk&&stat[d.blk])stat[d.blk].blk++;if(d.pf&&stat[d.pf])stat[d.pf].pf++;}
  function reconD(e){const d={o:e.oid},three=!!e.z; // 舊紀錄回推：得分/出手可還原，籃板/助攻無法
    if(e.k==='m3'){d.fga=1;d.fgm=1;d.t3a=1;d.t3m=1;d.pts=3;}

    // 把某分區的各輪整理成左→右的欄
    const confRounds=cf=>{
      const rs=[...(cf.history||[])];
      if(cf.stage==="playin")rs.push({name:"Play-in",series:[cf.pin.g1,cf.pin.g2,cf.pin.g3].filter(Boolean).map(snapSeries)});

  let h=`<h2>休賽期 <span class="tag">第 ${S.season} 季結束</span></h2>`;
  const champ=S.champs[S.champs.length-1];
  if(champ)h+=`<div class="card" style="text-align:center"><div style="font-size:30px">🏆</div><b>${champ.name}</b> 奪下第 ${champ.season} 季總冠軍${champ.mine?"——恭喜你！":""}</div>`;
  if(S.resign){
    h+=`<h2>① 到期合約</h2><p class="muted" style="margin-bottom:8px">球員合約到期，續約開價＝<b>當日身價</b>。小技巧：等他狀態冷下來再續，能省不少。</p><div class="card" style="padding:2px 4px">`;
    S.resign.ids.forEach(id=>{
      const p=S.roster.find(x=>x.id===id);if(!p)return;
      const ns=marketSal(p);
      h+=pRow(p,`<div style="display:flex;flex-direction:column;gap:5px"><button class="btn sm" data-act="resign" data-id="${p.id}" data-keep="1">續約 $${ns}M</button><button class="btn sm danger" data-act="resign" data-id="${p.id}" data-keep="0">放走</button></div>`);
    });
    h+=`</div>`;
    return h;
  }
  if(S.draft){
    const d=S.draft,cur=d.order[d.pick],onClock=cur===0;
    h+=`<h2>② 新秀選秀 <span class="tag">依戰績倒序</span></h2>`;
    if(d.done.length)h+=`<div class="card" style="padding:4px 8px">`+d.done.map(x=>`<div class="standing-row"><span class="rk">#${x.pk}</span><span class="nm">${x.team}</span><span class="wl">${x.p?x.p.name+"（"+x.p.ovr+"）":"放棄"}</span></div>`).join("")+`</div>`;
    if(onClock){
      h+=`<div class="card" style="border-color:var(--maple)"><b style="color:var(--led)">⏱ 輪到你選秀！</b><span class="muted">　第 ${d.pick+1} 順位</span></div>`;
      h+=`<div class="card" style="padding:2px 4px">`+d.pool.map(p=>pRow(p,`<button class="btn sm" data-act="pick" data-id="${p.id}">選他</button>`)).join("")+`</div>`;
      h+=`<button class="btn ghost block" data-act="skip">放棄這個選秀權</button>`;
    }else h+=`<button class="btn block" data-act="draftgo">▶ 繼續選秀</button>`;
    return h;
  }
  h+=`<h2>③ 整備陣容</h2><p class="muted" style="margin-bottom:8px">可以先去「市場」「交易」補強，準備好就開季。新秀已成長，所有人體力與傷勢已恢復。</p>`;
  h+=`<button class="btn block" data-act="newseason">🏀 開始第 ${S.season+1} 季</button>`;
  h+=`<div style="height:10px"></div><button class="btn ghost block" data-act="gomarket">先去逛市場 →</button>`;
  h+=`<div style="height:18px"></div><button class="btn ghost block" data-act="reset">🗑 重新開始（刪除存檔）</button>`;
  return h;
}
/* ============ 事件委派（行內 onclick 在沙箱中會被封鎖，統一在這裡處理） ============ */
document.addEventListener("click",e=>{
  const el=e.target.closest("[data-act]");
  if(!el)return;
  const a=el.dataset.act,id=el.dataset.id,arg=el.dataset.arg;
  switch(a){
    case "conf":newName=($("#tn")||{value:""}).value;newConf=arg;render();break;
    case "new":newGame(($("#tn")||{value:""}).value.trim(),newConf);break;
    case "tab":tab=arg;if(arg==="sched"&&S)S.unseen=false;render();break;
    case "startseason":startSeasonClock();break;
    case "starter":togStarter(id);break;
    case "autostart":S.starters=autoStarters(S.roster);S.defByOpp={};save();render();toast("已依狀態自動排出最佳先發");break;
    case "assigndef":tapMatchup(id||arg);break;
    case "rerollroster":rerollRoster();break;
    case "teststars":testStarTeam();break;
    case "testplay1":testPlay(1);break;
    case "testplay10":testPlay(10);break;
    case "release":release(id);break;
    case "sign":sign(id);break;
    case "mpos":marketPos=arg;render();break;
    case "tpos":teamPos=arg;render();break;
    case "rolldraft":refreshDraft();break;
    case "sync":syncReal();break;
    case "tsel":togSel(el.dataset.side,id);break;
    case "trade":proposeTrade();break;
    case "pick":draftAdvance(id);break;
    case "draftgo":draftAdvance(null);break;
    case "skip":skipPick();break;
    case "resign":resignDecide(id,el.dataset.keep==="1");break;
    case "newseason":startNewSeason();break;
    case "gomarket":tab="market";render();break;
    case "boxscore":showBoxscore(+arg);break;
    case "reset":resetAll();break;
  }
});
document.addEventListener("change",e=>{
  if(e.target.dataset&&e.target.dataset.act==="tteam"){
    tradeSel={team:+e.target.value,mine:[],theirs:[]};render();
  }
});
/* 錯誤可視化：意外錯誤直接顯示，方便回報 */
window.addEventListener("error",ev=>{try{toast("⚠ 程式錯誤："+(ev.message||"").slice(0,60));}catch(_){}});
/* ============ 啟動 ============ */
let cdTimer=null;
// 嘗試從本機伺服器載入真實球員數據；連不到就用內建後備資料
async function loadPlayersFromAPI(){
  try{
    const r=await fetch("/api/players",{cache:"no-store"});
    if(!r.ok)throw new Error("api "+r.status);
    const d=await r.json();
    if(d.players&&d.players.length>=16){
      DB=d.players;
      return {ok:true,count:d.players.length};
    }
    return {ok:false,reason:"資料不足"};
  }catch(e){
    return {ok:false,reason:"離線"};
  }
}
(async()=>{
  const api=await loadPlayersFromAPI();
  await load();
  if(S){marketCatchup();draftCatchup();tick();}
  render();
  // 在標題列下方顯示資料來源狀態
  const src=document.getElementById("dataSrc");
  if(src){
    if(api.ok)src.innerHTML='🟢 真實數據（'+api.count+' 名球員，來自本機伺服器）';
    else src.innerHTML='🟡 離線後備數據（未連到本機伺服器，使用內建 '+DB.length+' 名球員）';
  }
  setInterval(()=>{ // 每秒更新倒數；到點就補算（含每日行情）
    if(!S)return;
    if(marketCatchup()){draftCatchup();render();return;}
    if(draftCatchup()){if(tab==="market")render();}
    if(S.nextAt&&Date.now()>=S.nextAt){tick();render();return;}
    const el=document.getElementById("cd");
    if(el&&S.nextAt){
      const diff=Math.max(0,S.nextAt-Date.now());
      el.textContent=String(Math.floor(diff/3600000)).padStart(2,"0")+":"+String(Math.floor(diff%3600000/60000)).padStart(2,"0")+":"+String(Math.floor(diff%60000/1000)).padStart(2,"0");
    }
  },1000);
})();
</script>
