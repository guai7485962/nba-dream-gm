<title>夢之隊 GM・放置版</title>
<style>
:root{

  --led:#ffb02e; --good:#5fd97a; --bad:#ff6b6b; --blue:#5aa7ff;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{background:var(--arena);color:var(--ink);font-family:-apple-system,"PingFang TC","Noto Sans TC",sans-serif;font-size:15px;overscroll-behavior:none}
#app{max-width:520px;margin:0 auto;min-height:100%;display:flex;flex-direction:column}
header{padding:14px 16px 10px;border-bottom:2px solid var(--maple-deep);background:linear-gradient(180deg,#171a22,#101218);position:sticky;top:0;z-index:20}
.h-row{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
.h-title{font-size:19px;font-weight:800;letter-spacing:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.h-title .dot{color:var(--maple)}
.h-sub{font-size:12px;color:var(--dim);margin-top:3px;display:flex;gap:12px;flex-wrap:wrap}
.cap-bar{height:6px;background:var(--panel2);border-radius:3px;margin-top:8px;overflow:hidden}
.cap-fill{height:100%;background:linear-gradient(90deg,var(--maple),#e8b25f);border-radius:3px;transition:width .3s}
.cap-fill.over{background:var(--bad)}
main{flex:1;padding:12px 12px 84px}
nav{position:fixed;bottom:0;left:0;right:0;z-index:30;display:flex;max-width:520px;margin:0 auto;background:#14161d;border-top:1px solid var(--line);padding-bottom:env(safe-area-inset-bottom)}
nav button{flex:1;background:none;border:none;color:var(--dim);padding:10px 0 12px;font-size:12px;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:3px;position:relative}
nav button .ic{font-size:18px;line-height:1}
nav button.on{color:var(--led);font-weight:700}
nav button .badge{position:absolute;top:6px;right:18%;width:8px;height:8px;border-radius:50%;background:var(--bad)}
h2{font-size:15px;margin:6px 2px 10px;letter-spacing:.5px}
h2 .tag{font-size:11px;color:var(--dim);font-weight:400;margin-left:8px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:10px}
.p-row{display:flex;align-items:center;gap:10px;padding:9px 10px;border-bottom:1px solid var(--line)}
.p-row:last-child{border-bottom:none}
.ovr{min-width:40px;height:40px;border-radius:9px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:800;font-size:16px;background:var(--panel2);border:1px solid var(--line);line-height:1}
.ovr small{font-size:8px;font-weight:500;color:var(--dim);margin-top:1px}
.ovr.elite{color:#ffd166;border-color:#8a6a1f;background:#2a2415}
.ovr.star{color:var(--good)} .ovr.solid{color:var(--blue)}
.p-info{flex:1;min-width:0}
.p-name{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.p-meta{font-size:11.5px;color:var(--dim);margin-top:2px}
.sta{height:4px;background:var(--panel2);border-radius:2px;margin-top:5px;overflow:hidden;max-width:130px}
.sta i{display:block;height:100%;border-radius:2px;background:var(--good)}
.sta i.mid{background:var(--led)} .sta i.low{background:var(--bad)}
.p-sal{font-size:13px;font-weight:700;text-align:right;white-space:nowrap}
.p-sal small{display:block;font-size:10px;color:var(--dim);font-weight:400}
.btn{background:var(--maple);color:#1a1208;border:none;border-radius:9px;padding:10px 14px;font-size:14px;font-weight:800;font-family:inherit;letter-spacing:.5px}
.btn:active{transform:scale(.97)}
.btn.ghost{background:var(--panel2);color:var(--ink);border:1px solid var(--line);font-weight:600}
.btn.danger{background:#3a1f1f;color:var(--bad);border:1px solid #5a2e2e}
.btn.sm{padding:7px 11px;font-size:12.5px;border-radius:8px}
.btn:disabled{opacity:.4}
.btn.block{display:block;width:100%;margin-top:10px}
.muted{color:var(--dim);font-size:12.5px;line-height:1.6}
.pill{display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;background:var(--panel2);border:1px solid var(--line);color:var(--dim)}
.pill.gold{color:#ffd166;border-color:#8a6a1f}
.pill.red{color:var(--bad);border-color:#5a2e2e}
.pill.green{color:var(--good);border-color:#2e5a3a}
input,select{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--ink);border-radius:9px;padding:10px 12px;font-size:15px;font-family:inherit}
.scoreboard{background:#0b0c10;border:2px solid var(--maple-deep);border-radius:14px;padding:14px;margin-bottom:12px;box-shadow:inset 0 0 30px rgba(217,142,63,.07)}
.sb-teams{display:flex;justify-content:space-between;align-items:center;gap:8px}
.sb-team{flex:1;text-align:center;min-width:0}
.sb-name{font-size:12px;color:var(--dim);letter-spacing:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-score{font-family:"SF Mono",Menlo,monospace;font-size:42px;font-weight:700;color:var(--led);text-shadow:0 0 14px rgba(255,176,46,.45);line-height:1.1}
.sb-score.lose{color:#6f7480;text-shadow:none}
.sb-vs{font-size:11px;color:var(--maple);font-weight:800}
.sb-q{display:flex;justify-content:center;margin-top:10px;border-top:1px dashed #2a2e38;padding-top:8px}
.sb-q table{border-collapse:collapse;font-family:"SF Mono",Menlo,monospace;font-size:12px}
.sb-q td,.sb-q th{padding:2px 10px;text-align:center;color:var(--dim)}
.sb-q td{color:var(--ink)} .sb-q th{font-weight:400;font-size:10px}

.slot-dots span.done{background:var(--maple);border-color:var(--maple)}

.standing-row .rk{width:24px;color:var(--dim);font-family:Menlo,monospace;font-size:12px}

.standing-row .nm.me{color:var(--led)}
.standing-row .wl{font-family:Menlo,monospace;color:var(--dim);font-size:12.5px}

.res-row:last-child{border:none}
.res-row .sc{font-family:Menlo,monospace;font-weight:700}
.sel{outline:2px solid var(--led);outline-offset:-2px;border-radius:10px;background:#241f12}
.starter{outline:2px solid var(--good);outline-offset:-2px;border-radius:10px;background:#13231a}
.modal-bg{position:fixed;inset:0;background:rgba(5,6,9,.82);z-index:50;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--panel);border:1px solid var(--line);border-radius:18px 18px 0 0;width:100%;max-width:520px;max-height:88vh;overflow-y:auto;padding:16px 14px calc(20px + env(safe-area-inset-bottom))}
.modal h3{font-size:16px;margin-bottom:10px}
.boxline{display:flex;justify-content:space-between;font-size:13px;padding:5px 2px;border-bottom:1px dashed #262a34}
.boxline:last-child{border:none}
.boxline .bn{font-weight:600} .boxline .bs{font-family:Menlo,monospace;color:var(--dim)}
.boxtbl{width:100%;border-collapse:collapse;font-size:12px}
.boxtbl th{font-weight:400;font-size:10px;color:var(--dim);padding:3px 2px;text-align:center;border-bottom:1px solid var(--line)}
.boxtbl td{text-align:center;padding:4px 2px;color:var(--dim);font-family:Menlo,monospace;border-bottom:1px solid #21252e}
.boxtbl tbody tr:last-child td{border-bottom:none}
.boxtbl td:first-child{font-family:inherit;color:var(--ink)}
.tbasket{display:flex;align-items:center;gap:8px}
.tb-col{flex:1;min-width:0}
.tb-chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;min-height:20px}
.bchip{font-size:11px;background:var(--panel2);border:1px solid var(--line);border-radius:6px;padding:2px 6px;white-space:nowrap}
.tgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.tcol-h{font-size:12px;font-weight:700;color:var(--maple);padding:4px 2px 6px;position:sticky;top:118px;background:var(--arena)}
.tcard{display:flex;align-items:center;gap:7px;padding:6px;border:1px solid var(--line);border-radius:9px;margin-bottom:6px;background:var(--panel)}
.tcard.on{outline:2px solid var(--led);outline-offset:-2px;background:#241f12}
.tname{font-size:12.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%);background:#0b0c10;border:1px solid var(--maple-deep);color:var(--ink);padding:10px 16px;border-radius:99px;font-size:13.5px;z-index:60;box-shadow:0 6px 24px rgba(0,0,0,.5);white-space:nowrap;animation:pop .2s ease-out}
@keyframes pop{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.empty{padding:28px 10px;text-align:center;color:var(--dim);font-size:13.5px;line-height:1.7}
.flex{display:flex;align-items:center;gap:8px}
.mv-chip{font-size:11px;font-family:Menlo,monospace;margin-top:3px}
.mv-chip .v{color:var(--ink);font-weight:700}
.up{color:#ff5f5f} .dn{color:#41c878}
.spark{display:block;margin-top:6px}
.form-ic{font-size:11px}
.spacer{flex:1}
.bracket .vs{display:flex;align-items:center;gap:6px;padding:7px 4px;font-size:13px;border-bottom:1px dashed #262a34}
.bracket .vs:last-child{border:none}
.bracket b{font-family:Menlo,monospace}
@media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}

/* 評分公式：依真實數據換算 OVR */
function calcOvr(p){
  const [,,pts,reb,ast,stl,blk,fg]=p;
  let v=38+pts*1.05+reb*0.82+ast*0.95+stl*1.7+blk*1.7+(fg-44)*0.28;
  return Math.max(68,Math.min(99,Math.round(v)));
}

function posCount(roster){const c={PG:0,SG:0,SF:0,PF:0,C:0};(roster||[]).forEach(p=>{if(c[p.pos]!=null)c[p.pos]++;});return c;}

const rnd=(a,b)=>a+Math.random()*(b-a);
const ri=(a,b)=>Math.floor(rnd(a,b+1));
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function mkPlayer(arr,i){const ovr=(arr[10]!=null?arr[10]:calcOvr(arr));return{id:"p"+i,name:arr[0],pos:arr[1],pts:arr[2],reb:arr[3],ast:arr[4],stl:arr[5],blk:arr[6],fg:arr[7],sal:arr[8],team:arr[9]||"",ovr,sta:100,inj:0,yrs:ri(1,3),pot:0,form:0,mv:0,mvH:[]};}
function val(p){const mv=p.mv||mvBase(p);return mv*3+Math.pow(Math.max(1,p.ovr-64),1.7)*0.5+(p.pot>p.ovr?(p.pot-p.ovr)*2:0)-p.sal*1.2;}
function payroll(r){return r.reduce((s,p)=>s+p.sal,0);}
/* 身價市場：基準身價由 OVR+狀態 決定；續約開價＝當日身價 */
function mvBase(p){return Math.max(2.5,+(((p.ovr+p.form*0.8-63)*1.45)).toFixed(1));}
function initMv(p){if(p.form==null)p.form=0;if(!p.mv)p.mv=mvBase(p);if(!p.mvH||!p.mvH.length)p.mvH=[p.mv];}
function marketSal(p){return Math.max(2.5,+p.mv.toFixed(1));}
function mvChg(p){return p.mvH&&p.mvH.length>1?(p.mv/p.mvH[p.mvH.length-2]-1)*100:0;}
function allPlayers(){return [S.roster,...S.ai.map(t=>t.roster),S.fa].flat();}
function dayStart(t){const d=new Date(t);return new Date(d.getFullYear(),d.getMonth(),d.getDate()).getTime();}
const EVT=[
 {ic:"🔥",msg:"手感發燙，身價看漲",f:p=>{p.form=Math.min(8,p.form+ri(2,4));}},
 {ic:"❄️",msg:"陷入低潮，身價下修",f:p=>{p.form=Math.max(-8,p.form-ri(2,4));}},
 {ic:"📈",msg:"經紀人放話喊價",f:p=>{p.mv=+(p.mv*1.07).toFixed(1);}},
 {ic:"📉",msg:"交易流言纏身",f:p=>{p.mv=+(p.mv*0.93).toFixed(1);}},
];
function marketTick(){
  const all=allPlayers();
  // 隨機市場事件（玩家球員或大牌才上新聞）
  const pool=shuffle([...all]);
  for(let i=0;i<3&&i<pool.length;i++){
    const p=pool[i],e=EVT[ri(0,EVT.length-1)];
    e.f(p);
    if(S.roster.includes(p)||p.ovr>=84)S.log.unshift({type:"mkt",t:Date.now(),msg:e.ic+" "+p.name+"："+e.msg});
  }
  // 全員：狀態隨機漫步 → 身價向基準靠攏 + 日內波動
  all.forEach(p=>{
    p.form=Math.max(-8,Math.min(8,+(p.form+rnd(-1.1,1.1)-p.form*0.08).toFixed(2)));
    const tgt=mvBase(p);
    p.mv=Math.max(1.5,+(p.mv+(tgt-p.mv)*0.45+p.mv*rnd(-0.035,0.035)).toFixed(1));
    p.mvH.push(p.mv);if(p.mvH.length>21)p.mvH.shift();
  });
  // 投資組合：我的球隊總身價走勢
  S.teamMvH=S.teamMvH||[];
  S.teamMvH.push(+payrollMv(S.roster).toFixed(1));
  if(S.teamMvH.length>21)S.teamMvH.shift();
  S.log=S.log.slice(0,30);
}
function payrollMv(r){return r.reduce((s,p)=>s+(p.mv||0),0);}
function marketCatchup(){
  if(!S)return false;
  const today=dayStart(Date.now());
  if(S.mday==null){S.mday=today;allPlayers().forEach(initMv);S.teamMvH=[+payrollMv(S.roster).toFixed(1)];return true;}
  let n=0;
  while(S.mday<today&&n++<30){S.mday+=86400000;marketTick();}
  if(n)save();
  return n>0;
}
function healthy(r){return r.filter(p=>p.inj<=0);}
function eff(p){return (p.ovr+(p.form||0)*0.6)*(0.72+0.28*Math.max(0,p.sta)/100);}

/* ============ 先發與戰力 ============ */
function autoStarters(r){return healthy(r).sort((a,b)=>eff(b)-eff(a)).slice(0,5).map(p=>p.id);}
function lineupOf(team,isMe){
  const r=team.roster;
  let st=isMe?(S.starters||[]).map(id=>r.find(p=>p.id===id)).filter(p=>p&&p.inj<=0):[];
  if(!isMe||st.length<5){
    const have=new Set(st.map(p=>p.id));
    const fill=healthy(r).filter(p=>!have.has(p.id)).sort((a,b)=>eff(b)-eff(a));
    while(st.length<5&&fill.length)st.push(fill.shift());
  }
  const ids=new Set(st.map(p=>p.id));
  const bench=healthy(r).filter(p=>!ids.has(p.id)).sort((a,b)=>eff(b)-eff(a)).slice(0,5);
  return{st,bench};
}
function power(team,isMe){
  const{st,bench}=lineupOf(team,isMe);
  if(st.length<5)return 0; // 可上場人數不足
  let w=0,n=0;
  st.forEach(p=>{w+=eff(p)*1.45;n+=1.45;});
  bench.forEach((p,i)=>{const k=[1.0,0.88,0.74,0.6,0.45][i];w+=eff(p)*k;n+=k;});
  return w/n;
}

/* ============ 建立新遊戲 ============ */
/* 生成底薪角色球員（虛構），給擴張隊開局墊底 */
function genRoles(n){
  const arr=[];
  for(let i=0;i<n;i++){
    const ovr=ri(65,73);
    arr.push({id:"g"+Date.now().toString(36)+i+Math.floor(Math.random()*1e4).toString(36),
      name:FN[ri(0,FN.length-1)]+" "+LN[ri(0,LN.length-1)],
      pos:["PG","SG","SF","PF","C","SG","SF","PF"][i%8],
      pts:+(ovr*0.16+rnd(-1.5,1.5)).toFixed(1),reb:+rnd(2,6).toFixed(1),ast:+rnd(1,4).toFixed(1),
      stl:+rnd(0.3,1.1).toFixed(1),blk:+rnd(0.2,1).toFixed(1),fg:+rnd(43,50).toFixed(1),
      sal:+rnd(2.0,5.5).toFixed(1),ovr,pot:0,sta:100,inj:0,yrs:ri(1,3),form:0,mv:0,mvH:[]});
  }
  return arr;
}
/* 從 DB 列複製一份新球員（給選秀/球星市場用，不影響真實隊陣容） */
function clonePlayer(src){
  const ovr=(src[10]!=null?src[10]:calcOvr(src));
  return {id:"c"+Date.now().toString(36)+Math.floor(Math.random()*1e9).toString(36),
    name:src[0],pos:src[1],pts:src[2],reb:src[3],ast:src[4],stl:src[5],blk:src[6],fg:src[7],
    sal:src[8],team:src[9]||"",ovr,sta:100,inj:0,yrs:0,pot:0,form:0,mv:0,mvH:[]};
}
/* 選秀（球星市場）：每天刷新 4 次、每次 10 名真實球員，開價隨身價浮動 → 可挖便宜大咖 */
function rollDraftOffers(){
  const have=new Set(S.roster.map(p=>p.name));
  const cand=DB.filter(r=>!have.has(r[0]));
  const offers=[],used=new Set();
  let guard=0;
  while(offers.length<DRAFT_OFFERS&&guard++<600&&cand.length){
    // 加權：OVR 越高越稀有（指數壓低高 OVR 機率），挖到大咖更有驚喜
    const r=cand[Math.floor(Math.pow(Math.random(),1.7)*cand.length)];
    if(!r||used.has(r[0]))continue;
    used.add(r[0]);
    const c=clonePlayer(r);initMv(c);
    const ask=Math.max(2.0,+(c.mv*rnd(0.6,1.3)).toFixed(1)); // 開價隨身價浮動
    c.ask=ask;c.bargain=ask<=c.mv*0.8; // 明顯低於身價 → 💎 划算
    offers.push(c);
  }
  return offers.sort((a,b)=>b.ovr-a.ovr);
}
function draftSlotStart(t){const d=new Date(t),h=d.getHours();let s=0;for(const x of DRAFT_SLOTS)if(x<=h)s=x;return new Date(d.getFullYear(),d.getMonth(),d.getDate(),s,0,0,0).getTime();}
function nextDraftSlot(t){const d=new Date(t);for(const x of DRAFT_SLOTS){const s=new Date(d.getFullYear(),d.getMonth(),d.getDate(),x,0,0,0).getTime();if(s>t)return s;}return new Date(d.getFullYear(),d.getMonth(),d.getDate()+1,DRAFT_SLOTS[0],0,0,0).getTime();}
function ensureDraft(){if(!S.draftBoard||S.draftBoard.slot==null)S.draftBoard={slot:draftSlotStart(Date.now()),manualUsed:false,offers:rollDraftOffers()};}
/* 每到 0/6/12/18 點：自動換一批新球員，並重置免費刷新 */
function draftCatchup(){
  if(!S)return false;
  ensureDraft();
  const cur=draftSlotStart(Date.now());
  if(cur>S.draftBoard.slot){S.draftBoard.slot=cur;S.draftBoard.manualUsed=false;S.draftBoard.offers=rollDraftOffers();save();return true;}
  return false;
}
function refreshDraft(){ // 每個時段 1 次免費手動刷新
  ensureDraft();draftCatchup();
  if(S.draftBoard.manualUsed)return toast("這個時段的免費刷新已用完，等下次自動刷新（每 6 小時：0/6/12/18 點）");
  S.draftBoard.manualUsed=true;S.draftBoard.offers=rollDraftOffers();save();render();
}
function newGame(name){

  const byTeam={};
  DB.forEach((arr,i)=>{const p=mkPlayer(arr,i);(byTeam[p.team]=byTeam[p.team]||[]).push(p);});
  const ai=NBA_TEAMS.map(t=>{
    let roster=(byTeam[t.abbr]||[]).sort((a,b)=>b.ovr-a.ovr).slice(0,MAX_R);
    if(roster.length<MIN_R)roster=roster.concat(genRoles(MIN_R-roster.length)); // 深度不足補角色球員
    return {name:t.name,abbr:t.abbr,c:t.c,roster,w:0,l:0};
  });
  S={team:name||"我的夢之隊",abbr:"DRM",season:1,phase:"prep",round:0,w:0,l:0,
     roster:genRoles(8),fa:[],ai,starters:[],log:[],lastGame:null,champs:[],
     po:null,draft:null,draftBoard:null,resign:null,nextAt:null,unseen:false,rookieN:0,
     mday:dayStart(Date.now()),teamMvH:[],lastSync:0,
     myColor:"#d98e3f",gameHist:[]};
  S.starters=autoStarters(S.roster);
  ensureDraft();
  allPlayers().forEach(initMv);
  buildSchedule();save();render();
}
function buildSchedule(){
  // 31 隊（0=我隊，1..30=真實隊）循環賽程：圓桌法，奇數補一個「輪空」位
  const N=1+S.ai.length;
  const teams=[];for(let i=0;i<N;i++)teams.push(i);
  if(teams.length%2===1)teams.push(-1); // -1 = 輪空
  const m=teams.length,half=m/2,base=[];
  let arr=teams.slice();
  for(let r=0;r<m-1;r++){
    const rd=[];
    for(let k=0;k<half;k++){const a=arr[k],b=arr[m-1-k];if(a!==-1&&b!==-1)rd.push([a,b]);}
    base.push(rd);
    arr.splice(1,0,arr.pop()); // 固定首位，其餘旋轉
  }
  const rev=base.map(rd=>rd.map(([a,b])=>[b,a]));
  S.schedule=[...base,...rev]; // 雙循環，足夠打滿 REG_GAMES 場
}
function teamOf(i){return i===0?{name:S.team,roster:S.roster,get w(){return S.w},set w(v){S.w=v},get l(){return S.l},set l(v){S.l=v}}:S.ai[i-1];}
function addW(i){i===0?S.w++:S.ai[i-1].w++;}
function addL(i){i===0?S.l++:S.ai[i-1].l++;}
function winPct(w,l){return (w+l)?w/(w+l):0;}
function standings(){
  const list=[{idx:0,name:S.team,w:S.w,l:S.l},...S.ai.map((t,i)=>({idx:i+1,name:t.name,w:t.w,l:t.l}))];
  return list.sort((a,b)=>winPct(b.w,b.l)-winPct(a.w,a.l)||b.w-a.w);
}

function startSeasonClock(){
  if(S.roster.length<MIN_R)return toast("陣容至少需要 "+MIN_R+" 人");
  if(payroll(S.roster)>CAP)return toast("薪資超帽，無法開季");

}
function nextSlot(t){
  const d=new Date(t);
  for(const h of SLOT_HOURS){
    const s=new Date(d.getFullYear(),d.getMonth(),d.getDate(),h,0,0,0).getTime();
    if(s>t)return s;
  }
  const n=new Date(d.getFullYear(),d.getMonth(),d.getDate()+1,SLOT_HOURS[0],0,0,0);
  return n.getTime();
}

/* ============ 比賽模擬 ============ */
function simGame(ta,tb,meIdx){
  const pa=power(ta,meIdx===0)||50,pb=power(tb,meIdx===1)||50;
  const qa=[],qb=[];let sa=0,sb=0;
  for(let q=0;q<4;q++){
    let x=Math.round(23+(pa-80)*0.45+rnd(-6,6)),y=Math.round(23+(pb-80)*0.45+rnd(-6,6));
    x=Math.max(12,x);y=Math.max(12,y);qa.push(x);qb.push(y);sa+=x;sb+=y;
  }
  while(sa===sb){const x=ri(8,14),y=ri(8,14);if(x!==y){qa.push(x);qb.push(y);sa+=x;sb+=y;}}
  return{sa,sb,qa,qb,boxA:box(ta,meIdx===0,sa),boxB:box(tb,meIdx===1,sb)};
}
function box(team,isMe,total){
  const{st,bench}=lineupOf(team,isMe);
  const ps=[...st,...bench];
  const wts=ps.map(p=>Math.pow(Math.max(1,eff(p)-58),1.6)*rnd(0.7,1.3)),sum=wts.reduce((a,b)=>a+b,0)||1;
  return ps.map((p,i)=>{
    const starter=i<5;
    return {n:p.name,pos:p.pos,ovr:p.ovr,start:starter,
      min:starter?ri(28,38):ri(8,22),
      pts:Math.round(total*wts[i]/sum),
      reb:Math.max(0,Math.round(p.reb*rnd(0.6,1.5))),
      ast:Math.max(0,Math.round(p.ast*rnd(0.6,1.5))),
      stl:Math.max(0,Math.round(p.stl*rnd(0.4,1.8))),
      blk:Math.max(0,Math.round(p.blk*rnd(0.4,1.8))),
      fg:+(p.fg+rnd(-8,8)).toFixed(1)};
  }).sort((a,b)=>b.pts-a.pts);
}
function applyFatigueInjury(team,isMe,win){
  const{st,bench}=lineupOf(team,isMe);
  [...st,...bench].forEach((p,i)=>{
    p.sta=Math.max(0,p.sta-(i<5?15:8));
    p.form=Math.max(-8,Math.min(8,(p.form||0)+(win?0.25:-0.25)));
    if(Math.random()<0.018){p.inj=ri(3,10);p.form=Math.max(-8,(p.form||0)-2);
      if(isMe){S.log.unshift({type:"inj",t:Date.now(),msg:p.name+" 受傷，預計缺席 "+p.inj+" 場"});}}
  });
}
function recoverAll(){
  const all=[S.roster,...S.ai.map(t=>t.roster),S.fa];
  all.forEach(r=>r.forEach(p=>{p.sta=Math.min(100,p.sta+12);if(p.inj>0)p.inj--;}));
}

/* ============ 放置時鐘：補算所有到期場次 ============ */
function tick(){
  if(!S||!S.nextAt)return false;
  let played=false,guard=0;
  while(S.nextAt&&Date.now()>=S.nextAt&&guard++<400){
    recoverAll();
    if(S.phase==="regular")playRegularRound();
    else if(S.phase==="playoffs")playPlayoffSlot();
    // 玩家出局（沒進季後賽或被淘汰）→ 立即快轉跑完季後賽、產生冠軍、進休賽期
    if(S.phase==="playoffs"&&S.po&&S.po.meOut){let g=0;while(S.phase==="playoffs"&&g++<800)playPlayoffSlot();}
    if(S.nextAt)S.nextAt=nextSlot(S.nextAt);
    played=true;
  }
  if(played){S.unseen=true;save();}
  return played;
}
/* 其餘 29 隊互打：用戰力快速判勝負（不產生詳細數據，效能佳） */
function quickWin(A,B){
  const pa=power(A,false)||50,pb=power(B,false)||50;
  let sa=0,sb=0;
  for(let q=0;q<4;q++){sa+=Math.max(12,23+(pa-80)*0.45+rnd(-6,6));sb+=Math.max(12,23+(pb-80)*0.45+rnd(-6,6));}
  return sa===sb?Math.random()<0.5:sa>sb;
}
function playRegularRound(){
  const rd=S.schedule[S.round%S.schedule.length];
  rd.forEach(([a,b])=>{
    if(a===0||b===0){
      const A=teamOf(a),B=teamOf(b);
      if(a===0&&!legalMe()){addL(0);addW(b);S.log.unshift({type:"forfeit",t:Date.now(),msg:"陣容不足或超帽，本場棄賽判負 vs "+B.name});return;}
      if(b===0&&!legalMe()){addL(0);addW(a);S.log.unshift({type:"forfeit",t:Date.now(),msg:"陣容不足或超帽，本場棄賽判負 vs "+A.name});return;}
      const g=simGame(A,B,a===0?0:1);
      if(g.sa>g.sb){addW(a);addL(b);}else{addW(b);addL(a);}
      applyFatigueInjury(A,a===0,g.sa>g.sb);applyFatigueInjury(B,b===0,g.sb>g.sa);
      const me=a===0,win=me?g.sa>g.sb:g.sb>g.sa;
      const rec={a:A.name,b:B.name,g,meA:me,when:S.nextAt,label:"例行賽 第"+(S.w+S.l+1)+"場",win,
                 my:me?g.sa:g.sb,op:me?g.sb:g.sa,opp:me?B.name:A.name};
      S.lastGame=rec;
      S.gameHist.unshift(rec);S.gameHist=S.gameHist.slice(0,40);
      S.log.unshift({type:"game",t:S.nextAt,win,my:rec.my,op:rec.op,opp:rec.opp,label:(S.w+S.l)+"場"});
    }else{
      const A=teamOf(a),B=teamOf(b);
      if(quickWin(A,B)){addW(a);addL(b);}else{addW(b);addL(a);}
    }
  });
  S.log=S.log.slice(0,30);
  S.round++;
  if(S.w+S.l>=REG_GAMES)startPlayoffs();
}
function legalMe(){return S.roster.length>=MIN_R&&payroll(S.roster)<=CAP&&healthy(S.roster).length>=5;}

/* ============ 季後賽：前 16 強 + Play-in（系列賽三戰兩勝、Play-in 單場） ============ */
function mkSeries(a,b,target){return{a,b,wa:0,wb:0,hist:[],target:target||2};}
function seriesDone(s){return s.wa>=s.target||s.wb>=s.target;}
function seriesWinner(s){return s.wa>=s.target?s.a:s.b;}
function seriesLoser(s){return s.wa>=s.target?s.b:s.a;}
function poRoundName(n){return ({16:"16強",8:"8強",4:"4強",2:"冠軍賽"})[n]||(n+"強");}
function buildBracket(seeds){const n=seeds.length,s=[];for(let i=0;i<n/2;i++)s.push(mkSeries(seeds[i],seeds[n-1-i],2));return s;}
function nextRound(winners){const s=[];for(let i=0;i<winners.length;i+=2)s.push(mkSeries(winners[i],winners[i+1],2));return s;}
function startPlayoffs(){
  const st=standings();
  S.phase="playoffs";
  const auto=st.slice(0,14).map(t=>t.idx);   // 1–14 種子直接晉級
  const pi=st.slice(14,18).map(t=>t.idx);    // 15–18 種子打 Play-in 搶最後兩張門票
  const meOut=!auto.includes(0)&&!pi.includes(0); // 連 Play-in 都沒擠進 → 直接出局
  S.po={stage:"playin",auto,pi,
    pin:{g1:mkSeries(pi[0],pi[1],1),g2:mkSeries(pi[2],pi[3],1),g3:null},
    round:null,roundName:"Play-in",meOut};
  if(meOut)S.log.unshift({type:"info",t:Date.now(),msg:"本季無緣季後賽（戰績排不進前 16），快轉至冠軍出爐後重整旗鼓"});
  else S.log.unshift({type:"info",t:Date.now(),msg:"例行賽結束！前 16 強季後賽開打（15–18 種子先打 Play-in）"});
}
function playSeriesGame(s,roundLabel){
  if(seriesDone(s))return;
  const A=teamOf(s.a),B=teamOf(s.b);
  const g=simGame(A,B,s.a===0?0:(s.b===0?1:-1));
  if(g.sa>g.sb)s.wa++;else s.wb++;
  s.hist.push({sa:g.sa,sb:g.sb});
  applyFatigueInjury(A,s.a===0,g.sa>g.sb);applyFatigueInjury(B,s.b===0,g.sb>g.sa);
  if(s.a===0||s.b===0){
    const me=s.a===0,win=me?g.sa>g.sb:g.sb>g.sa;
    const rec={a:A.name,b:B.name,g,meA:me,when:S.nextAt,label:"季後賽 "+roundLabel,win,
               my:me?g.sa:g.sb,op:me?g.sb:g.sa,opp:me?B.name:A.name};
    S.lastGame=rec;S.gameHist.unshift(rec);S.gameHist=S.gameHist.slice(0,40);
    S.log.unshift({type:"game",t:S.nextAt,win,my:rec.my,op:rec.op,opp:rec.opp,label:roundLabel});
  }
}
function playPlayoffSlot(){
  const po=S.po;
  const lostMe=s=>s&&seriesDone(s)&&seriesLoser(s)===0;
  if(po.stage==="playin"){
    const pn=po.pin;
    playSeriesGame(pn.g1,"Play-in");playSeriesGame(pn.g2,"Play-in");
    if(lostMe(pn.g2))po.meOut=true; // 輸 g2 直接淘汰（輸 g1 還能打 g3）
    if(!pn.g3){
      if(seriesDone(pn.g1)&&seriesDone(pn.g2)){
        pn.g3=mkSeries(seriesLoser(pn.g1),seriesWinner(pn.g2),1);
        S.log.unshift({type:"info",t:Date.now(),msg:"Play-in 最終戰："+teamOf(seriesLoser(pn.g1)).name+" vs "+teamOf(seriesWinner(pn.g2)).name});
      }
    }else{
      playSeriesGame(pn.g3,"Play-in");
      if(lostMe(pn.g3))po.meOut=true;
      if(seriesDone(pn.g3)){
        const seeds=[...po.auto,seriesWinner(pn.g1),seriesWinner(pn.g3)];
        po.stage="bracket";po.round=buildBracket(seeds);po.roundName=poRoundName(16);
        S.log.unshift({type:"info",t:Date.now(),msg:"16 強對戰開始！"});
      }
    }
    return;
  }
  po.round.forEach(s=>playSeriesGame(s,po.roundName));
  po.round.forEach(s=>{if(lostMe(s))po.meOut=true;}); // 玩家本輪被淘汰
  if(po.round.every(seriesDone)){
    const winners=po.round.map(seriesWinner);
    if(winners.length===1){
      const c=winners[0];
      S.champs.push({season:S.season,name:teamOf(c).name,mine:c===0});
      S.log.unshift({type:"info",t:Date.now(),msg:"🏆 第 "+S.season+" 季冠軍："+teamOf(c).name+(c===0?"（就是你！）":"")});
      startOffseason();return;
    }
    po.round=nextRound(winners);po.roundName=poRoundName(winners.length);
    S.log.unshift({type:"info",t:Date.now(),msg:"晉級"+po.roundName+"！"});
  }
}

/* ============ 休賽期：成長 → 合約 → 選秀 ============ */
function startOffseason(){
  S.phase="offseason";S.po=null;S.nextAt=null; // 暫停時鐘，等玩家處理
  // 新秀成長
  const grow=p=>{if(p.pot&&p.ovr<p.pot){const g=Math.min(p.pot-p.ovr,ri(2,5));p.ovr+=g;p.pts=+(p.pts+g*0.25).toFixed(1);}};
  [S.roster,...S.ai.map(t=>t.roster),S.fa].forEach(r=>r.forEach(grow));
  // 合約年限 -1
  const expMine=[];
  const dec=(r,mine)=>{r.forEach(p=>{p.yrs--;if(p.yrs<=0&&mine)expMine.push(p.id);});};
  dec(S.roster,true);S.ai.forEach(t=>dec(t.roster,false));
  // AI 真實隊一律續約到期球員，維持真實陣容完整（不受薪資帽裁員）
  S.ai.forEach(t=>{
    t.roster.filter(p=>p.yrs<=0).forEach(p=>{p.sal=marketSal(p);p.yrs=ri(2,3);});
  });
  S.resign=expMine.length?{ids:expMine}:null;
  // 選秀池
  const order=standings().map(t=>t.idx).reverse();
  S.draft={order,pool:genRookies(12),pick:0,done:[]};
  S.draft.pool.forEach(initMv);
  // 體力與傷勢重置
  [S.roster,...S.ai.map(t=>t.roster),S.fa].forEach(r=>r.forEach(p=>{p.sta=100;p.inj=0;}));
  S.fa.sort((a,b)=>b.ovr-a.ovr);
}
function resignDecide(id,keep){
  const p=S.roster.find(x=>x.id===id);if(!p)return;
  const ns=marketSal(p);
  if(keep){
    if(payroll(S.roster)-p.sal+ns>CAP)return toast("續約後將超帽（新約 $"+ns+"M）");
    p.sal=ns;p.yrs=ri(2,3);toast("與 "+p.name+" 續約 $"+ns+"M");
  }else{
    S.roster.splice(S.roster.indexOf(p),1);p.sal=ns;p.yrs=0;S.fa.push(p);S.fa.sort((a,b)=>b.ovr-a.ovr);
    toast(p.name+" 成為自由球員");
  }
  S.resign.ids=S.resign.ids.filter(x=>x!==id);
  if(!S.resign.ids.length)S.resign=null;
  save();render();
}
/* --- 選秀 --- */
const FN=["Jaxon","Malik","Tyrese","Caleb","Darius","Zion","Kobe","Andre","Jalen","Marcus","Trey","Elijah","DeAndre","Isaiah","Quentin","Rashad"];
const LN=["Whitfield","Brooks","Sterling","Hayes","Vance","Okafor","Mercer","Donnelly","Kingsley","Battle","Crawford","Lemons","Achebe","Strand","Pruitt","Navarro"];
function genRookies(n){
  const arr=[];
  for(let i=0;i<n;i++){
    const ovr=Math.max(70,Math.round(84-i*1.1+rnd(-2,2)));
    S.rookieN++;
    arr.push({id:"r"+S.season+"_"+i,name:FN[ri(0,FN.length-1)]+" "+LN[ri(0,LN.length-1)],
      pos:["PG","SG","SF","PF","C"][ri(0,4)],
      pts:+(ovr*0.22+rnd(-2,2)).toFixed(1),reb:+rnd(2,7).toFixed(1),ast:+rnd(1,5).toFixed(1),
      stl:+rnd(0.4,1.4).toFixed(1),blk:+rnd(0.2,1.2).toFixed(1),fg:+rnd(42,50).toFixed(1),
      sal:+(9-i*0.45).toFixed(1),ovr,pot:Math.min(99,ovr+ri(3,12)),sta:100,inj:0,yrs:3,form:0,mv:0,mvH:[]});
  }
  return arr;
}
function draftAdvance(userPickId){
  const d=S.draft;
  while(d&&d.pick<d.order.length&&d.pool.length){
    const ti=d.order[d.pick];
    if(ti===0){
      if(!userPickId){save();render();return;}
      const i=d.pool.findIndex(p=>p.id===userPickId);const p=d.pool[i];
      if(payroll(S.roster)+p.sal>CAP)return toast("簽下他會超過薪資帽");
      if(S.roster.length>=MAX_R)return toast("名單已滿 13 人");
      d.pool.splice(i,1);S.roster.push(p);d.done.push({pk:d.pick+1,team:S.team,p});
      userPickId=null;
    }else{
      const t=S.ai[ti-1];const p=d.pool.shift();
      if(t.roster.length<MAX_R&&payroll(t.roster)+p.sal<=CAP){t.roster.push(p);}
      else S.fa.push(p);
      d.done.push({pk:d.pick+1,team:t.name,p});
    }
    d.pick++;
  }
  S.fa.push(...d.pool);S.fa.sort((a,b)=>b.ovr-a.ovr);
  S.draft=null;save();render();
}
function skipPick(){const d=S.draft;d.done.push({pk:d.pick+1,team:S.team,p:null});d.pick++;draftAdvance(null);}
function startNewSeason(){
  if(S.resign)return toast("先處理完到期合約");
  if(S.draft)return toast("先完成選秀");
  if(S.roster.length<MIN_R)return toast("陣容不足 "+MIN_R+" 人，先去市場補人");
  if(payroll(S.roster)>CAP)return toast("薪資超帽，先處理陣容");
  // AI 真實隊只補足深度（不足就補角色球員），不做超帽裁員，維持真實陣容
  S.ai.forEach(t=>{if(t.roster.length<MIN_R)t.roster=t.roster.concat(genRoles(MIN_R-t.roster.length));});
  S.fa.sort((a,b)=>b.ovr-a.ovr);
  S.season++;S.round=0;S.w=0;S.l=0;S.ai.forEach(t=>{t.w=0;t.l=0;});
  S.starters=autoStarters(S.roster);
  buildSchedule();S.phase="regular";S.nextAt=nextSlot(Date.now());
  S.draftBoard={slot:draftSlotStart(Date.now()),manualUsed:false,offers:rollDraftOffers()};
  save();render();toast("第 "+S.season+" 季開打！");
}

/* ============ 簽約 / 釋出 / 交易 ============ */
function sign(id){
  if(S.phase==="playoffs")return toast("季後賽期間禁止簽約");
  // 先找選秀開價球員（用開價簽），再找自由球員
  let p=null,from=null,oi=-1;
  if(S.draftBoard){oi=S.draftBoard.offers.findIndex(x=>x.id===id);if(oi>=0){p=S.draftBoard.offers[oi];from="draft";}}
  if(!p){oi=S.fa.findIndex(x=>x.id===id);if(oi>=0){p=S.fa[oi];from="fa";}}
  if(!p)return;
  if(S.roster.some(x=>x.name===p.name))return toast("你已經有 "+p.name+" 了");
  const price=from==="draft"?(p.ask||p.sal):p.sal;
  if(S.roster.length>=MAX_R)return toast("名單已滿 "+MAX_R+" 人");
  if(payroll(S.roster)+price>CAP)return toast("超過薪資帽 $"+CAP+"M（剩餘 $"+(CAP-payroll(S.roster)).toFixed(1)+"M）");
  p.sal=price;p.yrs=Math.max(p.yrs||0,2);delete p.ask;delete p.bargain;
  if(from==="draft")S.draftBoard.offers.splice(oi,1);else S.fa.splice(oi,1);
  S.roster.push(p);initMv(p);
  if(!S.starters||S.starters.length<5)S.starters=autoStarters(S.roster);
  save();render();toast("已簽下 "+p.name+"（$"+price+"M）");
}
function release(id){
  const i=S.roster.findIndex(p=>p.id===id);const p=S.roster[i];
  S.roster.splice(i,1);S.fa.push(p);S.fa.sort((a,b)=>b.ovr-a.ovr);
  S.starters=(S.starters||[]).filter(x=>x!==id);
  save();render();toast("已釋出 "+p.name);
}
function evalTrade(){
  const t=S.ai[tradeSel.team];
  const mine=S.roster.filter(p=>tradeSel.mine.includes(p.id));
  const theirs=t.roster.filter(p=>tradeSel.theirs.includes(p.id));
  if(!mine.length||!theirs.length)return{ok:false,msg:"雙方都要選至少 1 名球員"};
  const myNew=S.roster.length-mine.length+theirs.length;
  const aiNew=t.roster.length-theirs.length+mine.length;
  if(myNew<MIN_R||myNew>MAX_R)return{ok:false,msg:"交易後你的名單須維持 "+MIN_R+"–"+MAX_R+" 人"};
  if(aiNew<MIN_R||aiNew>MAX_R)return{ok:false,msg:"交易後對方名單須維持 "+MIN_R+"–"+MAX_R+" 人"};
  // 只有玩家受薪資帽限制；真實隊可超帽（符合真實 NBA 的鳥權等規則）
  const myPay=payroll(S.roster)-payroll(mine)+payroll(theirs);
  if(myPay>CAP)return{ok:false,msg:"交易後你將超過薪資帽（$"+myPay.toFixed(1)+"M）"};
  const gain=mine.reduce((s,p)=>s+val(p),0)-theirs.reduce((s,p)=>s+val(p),0);
  const need=-theirs.reduce((s,p)=>s+val(p),0)*0.04;
  return{ok:true,accept:gain>=need,gain};
}
function proposeTrade(){
  if(S.phase==="playoffs")return toast("季後賽期間禁止交易");
  const r=evalTrade();
  if(!r.ok)return toast(r.msg);
  const t=S.ai[tradeSel.team];
  if(!r.accept)return toast(t.name+"拒絕了：他們覺得虧太多");
  const mine=S.roster.filter(p=>tradeSel.mine.includes(p.id));
  const theirs=t.roster.filter(p=>tradeSel.theirs.includes(p.id));
  S.roster=S.roster.filter(p=>!tradeSel.mine.includes(p.id)).concat(theirs);
  t.roster=t.roster.filter(p=>!tradeSel.theirs.includes(p.id)).concat(mine);
  S.starters=(S.starters||[]).filter(id=>S.roster.some(p=>p.id===id));
  tradeSel={team:tradeSel.team,mine:[],theirs:[]};
  save();render();toast("交易成立！"+t.name+"同意了");
}

async function save(){try{await window.storage.set("nba_gm_idle",JSON.stringify(S));}catch(e){}}
async function load(){try{const r=await window.storage.get("nba_gm_idle");if(r&&r.value)S=JSON.parse(r.value);}catch(e){S=null;}
  if(S){ // 舊版存檔遷移
    // 重大改版：舊存檔（非 30 隊聯盟結構）不相容，視為新檔避免崩潰
    if(!S.ai||S.ai.length!==NBA_TEAMS.length){S=null;return;}
    if(S.lastSync==null)S.lastSync=0;
    if(!S.gameHist)S.gameHist=[];
    if(!S.myColor)S.myColor="#d98e3f";
    if(!S.draftBoard||S.draftBoard.slot==null)S.draftBoard=null;
    ensureDraft();
    // 依姓名從 DB 回填：球隊縮寫 + 新版 OVR（讓舊存檔球員套用新評分曲線）
    const _tm={},_ov={};DB.forEach(r=>{_tm[r[0]]=r[9]||"";if(r[10]!=null)_ov[r[0]]=r[10];});
    const _fix=p=>{if(!p)return;if(!p.team&&_tm[p.name])p.team=_tm[p.name];if(_ov[p.name]!=null)p.ovr=_ov[p.name];};
    allPlayers().forEach(_fix);
    if(S.draft&&S.draft.pool)S.draft.pool.forEach(_fix);
    allPlayers().forEach(initMv);
    if(S.draft&&S.draft.pool)S.draft.pool.forEach(initMv);
  }
}
let syncing=false;
async function syncReal(){
  if(syncing)return;
  if(Date.now()-(S.lastSync||0)<20*3600*1000)return toast("真實行情每天只能同步一次");
  syncing=true;render();
  try{
    const names=allPlayers().filter(p=>p.id[0]==="p").map(p=>p.name);
    const today=new Date().toLocaleDateString("zh-TW");
    const resp=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,
        tools:[{type:"web_search_20250305",name:"web_search"}],
        messages:[{role:"user",content:"今天是"+today+"。請用網路搜尋最近一週 NBA 的真實比賽表現與球員新聞，從下列球員名單中挑出 5 到 10 位近期狀態有明顯起伏（爆發、低潮、受傷、入選、奪冠等）的球員："+names.join(", ")+"。只回傳純 JSON 陣列、不要任何其他文字或 markdown 標記，格式：[{\"name\":\"球員英文名（需與名單完全一致）\",\"trend\":-3到3的整數（負為下跌）,\"note\":\"15字內的繁體中文原因\"}]"}]})
    });
    const data=await resp.json();
    const text=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n");
    const clean=text.replace(/```json|```/g,"").trim();
    const m=clean.match(/\[[\s\S]*\]/);
    const arr=JSON.parse(m?m[0]:clean);
    let hit=0;
    arr.forEach(x=>{
      const p=allPlayers().find(p=>p.name.toLowerCase()===String(x.name||"").toLowerCase());
      if(!p)return;
      const t=Math.max(-3,Math.min(3,Math.round(x.trend||0)));
      p.form=Math.max(-8,Math.min(8,p.form+t*1.4));
      p.mv=Math.max(1.5,+(p.mv*(1+t*0.035)).toFixed(1));
      S.log.unshift({type:"mkt",t:Date.now(),msg:(t>=0?"📡🔺 ":"📡🔻 ")+p.name+"："+(x.note||"真實行情更新")});
      hit++;
    });
    S.lastSync=Date.now();S.log=S.log.slice(0,30);
    save();toast(hit?"已同步真實行情，"+hit+" 名球員身價變動":"同步完成，近期沒有明顯變動");
  }catch(e){toast("同步失敗，稍後再試（需要網路）");}
  syncing=false;render();
}

/* --- 開新檔 --- */
function vStart(){
  return `<div class="card" style="margin-top:30px;text-align:center;padding:26px 18px">
    <div style="font-size:40px">🏀</div>
    <h2 style="margin-top:10px">建立你的球隊</h2>
    <p class="muted" style="margin-bottom:14px">放置經營：每天固定 4 場自動開打（02:00／08:00／14:00／20:00）。<br>你負責簽約、交易、排先發；比賽自己會發生。</p>
    <input id="tn" placeholder="輸入隊名（例如：台北夜鷹）" style="margin-bottom:10px">
    <button class="btn block" data-act="new">開始建隊</button>
    <p class="muted" style="margin-top:12px">薪資帽 $${CAP}M・簽滿 ${MIN_R} 人並按「開季」後，時鐘就開始走。</p>
  </div>`;
}
/* --- 我的球隊（含先發管理） --- */
function togStarter(id){
  const p=S.roster.find(x=>x.id===id);
  if(!p)return;
  S.starters=S.starters||[];
  const i=S.starters.indexOf(id);
  if(i>=0)S.starters.splice(i,1);
  else{
    if(p.inj>0)return toast(p.name+" 受傷中，無法排先發");
    if(S.starters.length>=5)return toast("先發只有 5 個位置，先取消一人");
    S.starters.push(id);
  }
  save();render();
}
function sparkline(arr,w,h){
  if(!arr||arr.length<2)return "";
  const mn=Math.min(...arr),mx=Math.max(...arr),rg=mx-mn||1;
  const pts=arr.map((v,i)=>(i/(arr.length-1)*w).toFixed(1)+","+(h-3-(v-mn)/rg*(h-6)).toFixed(1)).join(" ");
  const upTrend=arr[arr.length-1]>=arr[0];
  return `<svg class="spark" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}"><polyline points="${pts}" fill="none" stroke="${upTrend?"#ff5f5f":"#41c878"}" stroke-width="2" stroke-linejoin="round"/></svg>`;
}
function vTeam(){
  const r=[...S.roster].sort((a,b)=>eff(b)-eff(a));
  const pw=S.roster.length>=MIN_R?power({roster:S.roster},true).toFixed(1):"—";
  const stN=(S.starters||[]).filter(id=>S.roster.some(p=>p.id===id&&p.inj<=0)).length;
  let h=`<h2>我的陣容 <span class="tag">戰力 ${pw}・點球員設定先發（${stN}/5）</span></h2>`;
  if(S.roster.length){
    const tot=payrollMv(S.roster);
    const hist=S.teamMvH||[];
    const chg=hist.length>1?(tot/hist[hist.length-2]-1)*100:0;
    const cls=chg>0.05?"up":chg<-0.05?"dn":"";
    h+=`<div class="card"><div class="flex"><div><div class="muted">球隊總身價（投資組合）</div>
      <div style="font-size:22px;font-weight:800;font-family:Menlo,monospace">$${tot.toFixed(1)}M <span class="${cls}" style="font-size:13px">${chg>0?"▲":chg<0?"▼":""}${Math.abs(chg).toFixed(1)}%</span></div></div>
      <div class="spacer"></div>${sparkline(hist,110,32)}</div>
      <div class="muted" style="font-size:11px;margin-top:4px">行情每天跳動一次・紅漲綠跌・低買高賣賺取陣容價值</div></div>`;
  }
  if(S.phase==="prep")h+=`<div class="card" style="border-color:var(--maple)"><b style="color:var(--led)">組隊階段</b><p class="muted">簽滿 ${MIN_R} 人後按下方「開季」，之後每天自動打 4 場。</p><button class="btn block" data-act="startseason">🏀 開季！啟動賽程時鐘</button></div>`;
  if(!r.length)h+=`<div class="card empty">還沒有球員。<br>到「市場」分頁簽下你的第一批球員吧！</div>`;
  else{
    // 位置分類篩選（按鈕帶各位置人數）
    const cnt=posCount(S.roster);
    h+=`<div class="flex" style="margin:2px 0 10px;gap:6px;overflow-x:auto">`
      +`<button class="btn sm ${teamPos==="ALL"?"":"ghost"}" data-act="tpos" data-arg="ALL">全部 ${S.roster.length}</button>`
      +POSITIONS.map(p=>`<button class="btn sm ${teamPos===p?"":"ghost"}" data-act="tpos" data-arg="${p}">${p} ${cnt[p]}</button>`).join("")
      +`</div>`;
    const list=teamPos==="ALL"?r:r.filter(p=>p.pos===teamPos);
    h+=`<div class="card" style="padding:2px 4px">`+(list.length?list.map(p=>`<div class="${(S.starters||[]).includes(p.id)?"starter":""}" data-act="starter" data-id="${p.id}">${pRow(p,`<button class="btn sm danger" data-act="release" data-id="${p.id}">釋出</button>`,true)}</div>`).join(""):`<div class="empty">這個位置沒有球員</div>`)+`</div>`;
  }
  h+=`<p class="muted">綠框 = 先發五人。沒排滿時系統會自動以最佳狀態球員補位。先發消耗較多體力（-15／場，替補 -8），體力每 6 小時回 12，低體力會降低實際戰力——記得輪休！</p>`;
  h+=`<button class="btn ghost block" data-act="reset">🗑 刪除存檔重新開始</button>`;
  return h;
}
/* --- 選秀・球星市場（每 6 小時自動刷新、每段 1 次免費手動刷新，可挖便宜大咖） --- */
function vMarket(){
  ensureDraft();draftCatchup();
  const room=(CAP-payroll(S.roster)).toFixed(1);
  const poss=["ALL","PG","SG","SF","PF","C"];
  const free=!S.draftBoard.manualUsed;
  const nextT=nextDraftSlot(Date.now());
  const lock=S.phase==="playoffs";
  const offers=S.draftBoard.offers.filter(p=>marketPos==="ALL"||p.pos===marketPos);
  const offerRow=p=>`<div class="p-row" data-pid="${p.id}">
    <div class="ovr ${ovrCls(p.ovr)}">${p.ovr}<small>OVR</small></div>
    <div class="p-info">
      <div class="p-name">${p.name} ${p.bargain?'<span style="color:var(--led);font-weight:700">💎划算</span>':''}</div>
      <div class="p-meta">${p.team?'<span style="color:var(--blue);font-weight:600">'+p.team+'</span> ':''}${p.pos}・${p.pts}分 ${p.reb}板 ${p.ast}助・身價 $${(p.mv||0).toFixed(1)}M</div>
    </div>
    <div class="p-sal" style="color:${p.bargain?'var(--led)':'var(--ink)'}">$${(p.ask||p.sal).toFixed(1)}M<small>開價</small></div>
    <button class="btn sm" ${lock?'disabled':''} data-act="sign" data-id="${p.id}">簽下</button>
  </div>`;
  let h=`<h2>選秀・球星市場 <span class="tag">剩餘空間 $${room}M${lock?'・季後賽鎖定':''}</span></h2>`;
  h+=`<div class="card flex">
    <div style="flex:1"><b style="font-size:13px">🔄 下次自動刷新 <span id="draftcd">${fmtT(nextT)}</span></b><div class="muted" style="font-size:11px">每 6 小時（0/6/12/18 點）自動換一批 ${DRAFT_OFFERS} 人，每段有 1 次免費手動刷新。開價隨身價浮動，💎=跳樓價！</div></div>
    <button class="btn sm ${free?'':'ghost'}" ${free?'':'disabled'} data-act="rolldraft">${free?'免費刷新':'已用完'}</button>
  </div>`;
  // 我目前各位置人數（缺位置時標紅，提醒補強）
  const myc=posCount(S.roster);
  h+=`<div class="card" style="padding:8px 10px"><div class="muted" style="font-size:11px;margin-bottom:5px">我的陣容各位置（共 ${S.roster.length}/${MAX_R} 人）</div>
    <div class="flex" style="gap:12px;flex-wrap:wrap">${POSITIONS.map(p=>{const n=myc[p],thin=n===0;return `<span style="font-size:14px;font-weight:700">${p} <span style="color:${thin?'var(--bad)':'var(--led)'}">${n}</span></span>`;}).join("")}</div></div>`;
  h+=`<div class="flex" style="margin-bottom:10px;gap:6px;overflow-x:auto">${poss.map(p=>`<button class="btn sm ${marketPos===p?'':'ghost'}" data-act="mpos" data-arg="${p}">${p==="ALL"?'全部':p}</button>`).join("")}</div>`;
  h+=`<div class="card" style="padding:2px 4px">${offers.length?offers.map(offerRow).join(""):'<div class="empty">這個位置沒有球員，換個位置或刷新看看</div>'}</div>`;
  const fa=S.fa.filter(p=>marketPos==="ALL"||p.pos===marketPos);
  if(fa.length){
    h+=`<h2 style="margin-top:14px">自由球員 <span class="tag">直接簽，年薪固定</span></h2>`;
    h+=`<div class="card" style="padding:2px 4px">${fa.map(p=>pRow(p,`<button class="btn sm" ${lock?'disabled':''} data-act="sign" data-id="${p.id}">簽下</button>`)).join("")}</div>`;
  }
  return h;
}
/* --- 交易 --- */
function togSel(side,id){
  const arr=tradeSel[side];const i=arr.indexOf(id);
  if(i>=0)arr.splice(i,1);else{if(arr.length>=2)return toast("每邊最多選 2 人");arr.push(id);}
  render();
}
function vTrade(){
  const t=S.ai[tradeSel.team];
  const mine=S.roster.filter(p=>tradeSel.mine.includes(p.id));
  const theirs=t.roster.filter(p=>tradeSel.theirs.includes(p.id));
  const ev=(mine.length&&theirs.length)?evalTrade():null;
  let hint="選擇雙方球員後，這裡會顯示對方是否願意交易";
  let hintCls="var(--dim)";
  if(ev&&ev.ok){hint=ev.accept?`✓ ${t.name} 應該會接受`:`✗ ${t.name} 不會接受（你給的籌碼不足）`;hintCls=ev.accept?"var(--good)":"var(--bad)";}
  else if(ev){hint=ev.msg;hintCls="var(--bad)";}
  // 緊湊球員卡：頭像 OVR + 名 + 身價，點擊切換
  const chip=(p,side)=>{
    const on=(side==="mine"?tradeSel.mine:tradeSel.theirs).includes(p.id);
    return `<div class="tcard ${on?"on":""}" data-act="tsel" data-side="${side}" data-id="${p.id}">
      <div class="ovr ${ovrCls(p.ovr)}" style="min-width:32px;height:32px;font-size:13px">${p.ovr}</div>
      <div style="flex:1;min-width:0">
        <div class="tname">${formIc(p)}${p.name}</div>
        <div class="muted" style="font-size:10px">${p.team?p.team+"・":""}${p.pos}・年薪$${(p.sal||0).toFixed(1)}M・身價$${(p.mv||0).toFixed(1)}M</div>
      </div>
      ${on?'<span style="color:var(--led);font-weight:800">✓</span>':""}
    </div>`;
  };
  const basket=(arr,empty)=>arr.length
    ? arr.map(p=>`<span class="bchip">${p.name.split(" ").pop()} <span class="muted">$${(p.mv||0).toFixed(0)}M</span></span>`).join("")
    : `<span class="muted" style="font-size:11px">${empty}</span>`;
  const myV=mine.reduce((s,p)=>s+(p.mv||0),0),thV=theirs.reduce((s,p)=>s+(p.mv||0),0);
  return `<h2>球員交易 <span class="tag">點頭像加入交易${S.phase==="playoffs"?"・季後賽鎖定":""}</span></h2>
  <select data-act="tteam" style="margin-bottom:10px">
    ${S.ai.map((a,i)=>`<option value="${i}" ${i===tradeSel.team?"selected":""}>${a.name}（${a.w}勝${a.l}敗）</option>`).join("")}
  </select>
  <div class="card" style="position:sticky;top:0;z-index:5;padding:10px">
    <div class="tbasket">
      <div class="tb-col"><div class="muted" style="font-size:11px">我送出 <b style="color:var(--ink)">$${myV.toFixed(0)}M</b></div><div class="tb-chips">${basket(mine,"未選")}</div></div>
      <div style="color:var(--maple);font-weight:800;font-size:16px">⇄</div>
      <div class="tb-col" style="text-align:right"><div class="muted" style="font-size:11px"><b style="color:var(--ink)">$${thV.toFixed(0)}M</b> 我得到</div><div class="tb-chips" style="justify-content:flex-end">${basket(theirs,"未選")}</div></div>
    </div>
    <div style="text-align:center;font-size:12px;color:${hintCls};margin:8px 0 4px">${hint}</div>
    <button class="btn block" style="margin-top:2px" ${S.phase==="playoffs"||!ev||!ev.accept?"disabled":""} data-act="trade">送出交易提案</button>
  </div>
  <div class="tgrid">
    <div>
      <div class="tcol-h">我的球員</div>
      ${[...S.roster].sort((a,b)=>b.ovr-a.ovr).map(p=>chip(p,"mine")).join("")||'<div class="muted" style="font-size:11px;padding:8px">先去簽人</div>'}
    </div>
    <div>
      <div class="tcol-h">${t.abbr||t.name}</div>
      ${[...t.roster].sort((a,b)=>b.ovr-a.ovr).map(p=>chip(p,"theirs")).join("")}
    </div>
  </div>
  <p class="muted" style="margin-top:8px;font-size:11px">每邊最多 2 人。小技巧：趁對方球星❄️低潮時，用你的🔥熱門球員去換，AI 估值會更划算。</p>`;
}
/* --- 賽程（放置核心畫面） --- */
function vSched(){
  let h="";
  if(S.phase==="prep"){
    h+=`<div class="card empty">時鐘還沒啟動。<br>到「球隊」簽滿 ${MIN_R} 人並按「開季」。</div>`;
  }else if(S.nextAt){
    const now=Date.now(),diff=Math.max(0,S.nextAt-now);
    const hh=String(Math.floor(diff/3600000)).padStart(2,"0"),mm=String(Math.floor(diff%3600000/60000)).padStart(2,"0"),ss=String(Math.floor(diff%60000/1000)).padStart(2,"0");
    const today=new Date();
    const dots=SLOT_HOURS.map(hr=>{
      const t=new Date(today.getFullYear(),today.getMonth(),today.getDate(),hr).getTime();
      return `<span class="${t<now?"done":""}"></span>`;
    }).join("");
    let nextDesc="";
    if(S.phase==="regular"){
      const rd=S.schedule[S.round%S.schedule.length]||[];
      const my=rd.find(([a,b])=>a===0||b===0);
      if(my){const op=teamOf(my[0]===0?my[1]:my[0]);nextDesc=`第 ${S.w+S.l+1} 場 vs ${op.name}（戰力 ${power(op,false).toFixed(0)}）`;}
      else nextDesc="輪休日（本輪沒有你的比賽）";
    }else if(S.phase==="playoffs"){
      nextDesc="季後賽・"+(S.po.stage==="playin"?"Play-in":(S.po.roundName||""));
    }
    h+=`<div class="scoreboard">
      <div class="sb-name" style="text-align:center;margin-bottom:6px">下一場 ${fmtT(S.nextAt)}・${nextDesc}</div>
      <div class="countdown" id="cd">${hh}:${mm}:${ss}</div>
      <div class="slot-dots">${dots}</div>
      <div class="muted" style="text-align:center;margin-top:6px;font-size:11px">每天 02:00／08:00／14:00／20:00 自動開打</div>
    </div>`;
  }
  const gh=(S.gameHist||[]).slice(0,20);
  if(gh.length){
    h+=`<h2>比賽紀錄 <span class="tag">最近 ${gh.length} 場・點擊看詳細數據</span></h2><div class="card" style="padding:2px 4px">`;
    gh.forEach((L,i)=>{
      h+=`<div class="res-row" data-act="boxscore" data-arg="${i}" style="cursor:pointer">
        <span style="width:26px;color:${L.win?"var(--good)":"var(--bad)"};font-weight:700">${L.win?"勝":"負"}</span>
        <span class="nm" style="flex:1">vs ${L.opp}<div class="muted" style="font-size:10px">${L.label}・${fmtT(L.when)}</div></span>
        <span class="sc" style="color:${L.win?"var(--good)":"var(--bad)"}">${L.my}</span>
        <span class="muted" style="font-family:Menlo,monospace">:${L.op}</span>
        <span style="color:var(--dim);font-size:12px;margin-left:4px">›</span>
      </div>`;
    });
    h+=`</div>`;
  }
  const items=(S.log||[]).filter(x=>x.type!=="game").slice(0,12);
  if(items.length){
    h+=`<h2>聯盟動態</h2><div class="card" style="padding:4px 8px">`;
    items.forEach(x=>{h+=`<div class="res-row"><span style="flex:1;color:var(--dim)">${x.msg}</span></div>`;});
    h+=`</div>`;
  }
  if(!h)h=`<div class="card empty">尚無賽程資訊</div>`;
  return h;
}
/* --- 詳細數據彈窗 --- */
function showBoxscore(idx){
  const L=(S.gameHist||[])[idx];if(!L)return;
  const g=L.g;
  const sided=(name,boxArr,mine)=>{
    const rows=boxArr.map(b=>`<tr>
      <td style="text-align:left;padding-left:2px">${b.start?"<span style='color:var(--led)'>●</span> ":"　"}${b.n}<span style="color:var(--dim);font-size:10px"> ${b.pos}</span></td>
      <td>${b.min}</td><td style="font-weight:700;color:var(--ink)">${b.pts}</td><td>${b.reb}</td><td>${b.ast}</td><td>${b.stl}</td><td>${b.blk}</td><td>${b.fg}</td>
    </tr>`).join("");
    return `<div class="card" style="padding:8px 6px;border-color:${mine?"var(--maple-deep)":"var(--line)"}">
      <div class="muted" style="margin-bottom:4px;font-weight:700;color:${mine?"var(--led)":"var(--dim)"}">${name}${mine?"（我隊）":""}</div>
      <table class="boxtbl"><thead><tr><th style="text-align:left">球員</th><th>分鐘</th><th>得分</th><th>籃板</th><th>助攻</th><th>抄截</th><th>火鍋</th><th>命中%</th></tr></thead>
      <tbody>${rows}</tbody></table></div>`;
  };
  const bg=document.createElement("div");bg.className="modal-bg";
  bg.innerHTML=`<div class="modal">
    <div class="scoreboard">
      <div class="sb-name" style="text-align:center;margin-bottom:6px">${L.label}・${fmtT(L.when)}</div>
      <div class="sb-teams">
        <div class="sb-team"><div class="sb-name">${L.a}</div><div class="sb-score ${g.sa<g.sb?"lose":""}">${g.sa}</div></div>
        <div class="sb-vs">FINAL</div>
        <div class="sb-team"><div class="sb-name">${L.b}</div><div class="sb-score ${g.sb<g.sa?"lose":""}">${g.sb}</div></div>
      </div>
      <div class="sb-q"><table>
        <tr><th></th>${g.qa.map((_,i)=>`<th>${i<4?"Q"+(i+1):"OT"}</th>`).join("")}<th>總分</th></tr>
        <tr><td style="font-size:10px">${L.a.slice(0,4)}</td>${g.qa.map(q=>`<td>${q}</td>`).join("")}<td style="color:var(--ink)">${g.sa}</td></tr>
        <tr><td style="font-size:10px">${L.b.slice(0,4)}</td>${g.qb.map(q=>`<td>${q}</td>`).join("")}<td style="color:var(--ink)">${g.sb}</td></tr>
      </table></div>
    </div>
    ${sided(L.a,g.boxA,L.meA)}
    ${sided(L.b,g.boxB,!L.meA)}
    <div class="muted" style="font-size:11px;text-align:center;margin:4px 0">● = 先發　數據為單場模擬結果</div>
    <button class="btn block" data-act="closemodal">關閉</button>
  </div>`;
  bg.addEventListener("click",e=>{if(e.target===bg||e.target.dataset.act==="closemodal")bg.remove();});
  document.body.appendChild(bg);
}
/* --- 聯盟 --- */
function vLeague(){
  const st=standings();
  let h=`<h2>戰績榜 <span class="tag">第 ${S.season} 季・前 16 名進季後賽</span></h2><div class="card" style="padding:4px 8px">`;
  st.forEach((t,i)=>{const mark=i<14?"🔸":i<18?"🟡":"";h+=`<div class="standing-row"><span class="rk">${i+1}</span><span class="nm ${t.idx===0?"me":""}">${mark}${t.name}</span><span class="wl">${t.w}勝 ${t.l}敗</span></div>`;});
  h+=`</div><p class="muted" style="font-size:11px;margin-top:4px">🔸 直接晉級（1–14）　🟡 Play-in（15–18 搶最後兩張門票）</p>`;
  if(S.po){
    h+=`<h2 style="margin-top:14px">季後賽（系列賽三戰兩勝）</h2><div class="card bracket">`;
    if(S.po.stage==="playin"){
      const pn=S.po.pin,line=(s,lab)=>s?`<div class="vs"><span class="nm" style="flex:1">${lab} ${teamOf(s.a).name} vs ${teamOf(s.b).name}</span><b>${s.wa}-${s.wb}</b></div>`:"";
      h+=`<div class="muted" style="font-size:11px;margin-bottom:4px">Play-in</div>`+line(pn.g1,"①")+line(pn.g2,"②")+line(pn.g3,"決");
    }else if(S.po.round){
      h+=`<div class="muted" style="font-size:11px;margin-bottom:4px">${S.po.roundName}</div>`;
      S.po.round.forEach(s=>{h+=`<div class="vs ${s.a===0||s.b===0?'':''}" style="${s.a===0||s.b===0?'color:var(--led)':''}"><span class="nm" style="flex:1">${teamOf(s.a).name} vs ${teamOf(s.b).name}</span><b>${s.wa} - ${s.wb}</b></div>`;});
    }
    h+=`</div>`;
  }
  if(S.champs.length){
    h+=`<h2 style="margin-top:14px">歷史冠軍</h2><div class="card" style="padding:4px 8px">`;
    [...S.champs].reverse().forEach(c=>{h+=`<div class="standing-row"><span class="rk">S${c.season}</span><span class="nm ${c.mine?"me":""}">🏆 ${c.name}</span></div>`;});
    h+=`</div>`;
  }
  return h;
}
/* --- 休賽期流程 --- */
function vOffseason(){
  let h=`<h2>休賽期 <span class="tag">第 ${S.season} 季結束</span></h2>`;
  const champ=S.champs[S.champs.length-1];
  if(champ)h+=`<div class="card" style="text-align:center"><div style="font-size:30px">🏆</div><b>${champ.name}</b> 奪下第 ${champ.season} 季總冠軍${champ.mine?"——恭喜你！":""}</div>`;
  if(S.resign){
    h+=`<h2>① 到期合約</h2><p class="muted" style="margin-bottom:8px">球員合約到期，續約開價＝<b>當日身價</b>。小技巧：等他狀態冷下來再續，能省不少。</p><div class="card" style="padding:2px 4px">`;
    S.resign.ids.forEach(id=>{
      const p=S.roster.find(x=>x.id===id);if(!p)return;
      const ns=marketSal(p);
      h+=pRow(p,`<div style="display:flex;flex-direction:column;gap:5px"><button class="btn sm" data-act="resign" data-id="${p.id}" data-keep="1">續約 $${ns}M</button><button class="btn sm danger" data-act="resign" data-id="${p.id}" data-keep="0">放走</button></div>`);
    });
    h+=`</div>`;
    return h;
  }
  if(S.draft){
    const d=S.draft,cur=d.order[d.pick],onClock=cur===0;
    h+=`<h2>② 新秀選秀 <span class="tag">依戰績倒序</span></h2>`;
    if(d.done.length)h+=`<div class="card" style="padding:4px 8px">`+d.done.map(x=>`<div class="standing-row"><span class="rk">#${x.pk}</span><span class="nm">${x.team}</span><span class="wl">${x.p?x.p.name+"（"+x.p.ovr+"）":"放棄"}</span></div>`).join("")+`</div>`;
    if(onClock){
      h+=`<div class="card" style="border-color:var(--maple)"><b style="color:var(--led)">⏱ 輪到你選秀！</b><span class="muted">　第 ${d.pick+1} 順位</span></div>`;
      h+=`<div class="card" style="padding:2px 4px">`+d.pool.map(p=>pRow(p,`<button class="btn sm" data-act="pick" data-id="${p.id}">選他</button>`)).join("")+`</div>`;
      h+=`<button class="btn ghost block" data-act="skip">放棄這個選秀權</button>`;
    }else h+=`<button class="btn block" data-act="draftgo">▶ 繼續選秀</button>`;
    return h;
  }
  h+=`<h2>③ 整備陣容</h2><p class="muted" style="margin-bottom:8px">可以先去「市場」「交易」補強，準備好就開季。新秀已成長，所有人體力與傷勢已恢復。</p>`;
  h+=`<button class="btn block" data-act="newseason">🏀 開始第 ${S.season+1} 季</button>`;
  h+=`<div style="height:10px"></div><button class="btn ghost block" data-act="gomarket">先去逛市場 →</button>`;
  return h;
}
/* ============ 事件委派（行內 onclick 在沙箱中會被封鎖，統一在這裡處理） ============ */
document.addEventListener("click",e=>{
  const el=e.target.closest("[data-act]");
  if(!el)return;
  const a=el.dataset.act,id=el.dataset.id,arg=el.dataset.arg;
  switch(a){
    case "new":newGame(($("#tn")||{value:""}).value.trim());break;
    case "tab":tab=arg;if(arg==="sched"&&S)S.unseen=false;render();break;
    case "startseason":startSeasonClock();break;
    case "starter":togStarter(id);break;
    case "release":release(id);break;
    case "sign":sign(id);break;
    case "mpos":marketPos=arg;render();break;
    case "tpos":teamPos=arg;render();break;
    case "rolldraft":refreshDraft();break;
    case "sync":syncReal();break;
    case "tsel":togSel(el.dataset.side,id);break;
    case "trade":proposeTrade();break;
    case "pick":draftAdvance(id);break;
    case "draftgo":draftAdvance(null);break;
    case "skip":skipPick();break;
    case "resign":resignDecide(id,el.dataset.keep==="1");break;
    case "newseason":startNewSeason();break;
    case "gomarket":tab="market";render();break;
    case "boxscore":showBoxscore(+arg);break;
    case "reset":resetAll();break;
  }
});
document.addEventListener("change",e=>{
  if(e.target.dataset&&e.target.dataset.act==="tteam"){
    tradeSel={team:+e.target.value,mine:[],theirs:[]};render();
  }
});
/* 錯誤可視化：意外錯誤直接顯示，方便回報 */
window.addEventListener("error",ev=>{try{toast("⚠ 程式錯誤："+(ev.message||"").slice(0,60));}catch(_){}});
/* ============ 啟動 ============ */
let cdTimer=null;
// 嘗試從本機伺服器載入真實球員數據；連不到就用內建後備資料
async function loadPlayersFromAPI(){
  try{
    const r=await fetch("/api/players",{cache:"no-store"});
    if(!r.ok)throw new Error("api "+r.status);
    const d=await r.json();
    if(d.players&&d.players.length>=16){
      DB=d.players;
      return {ok:true,count:d.players.length};
    }
    return {ok:false,reason:"資料不足"};
  }catch(e){
    return {ok:false,reason:"離線"};
  }
}
(async()=>{
  const api=await loadPlayersFromAPI();
  await load();
  if(S){marketCatchup();draftCatchup();tick();}
  render();
  // 在標題列下方顯示資料來源狀態
  const src=document.getElementById("dataSrc");
  if(src){
    if(api.ok)src.innerHTML='🟢 真實數據（'+api.count+' 名球員，來自本機伺服器）';
    else src.innerHTML='🟡 離線後備數據（未連到本機伺服器，使用內建 '+DB.length+' 名球員）';
  }
  setInterval(()=>{ // 每秒更新倒數；到點就補算（含每日行情）
    if(!S)return;
    if(marketCatchup()){draftCatchup();render();return;}
    if(draftCatchup()){if(tab==="market")render();}
    if(S.nextAt&&Date.now()>=S.nextAt){tick();render();return;}
    const el=document.getElementById("cd");
    if(el&&S.nextAt){
      const diff=Math.max(0,S.nextAt-Date.now());
      el.textContent=String(Math.floor(diff/3600000)).padStart(2,"0")+":"+String(Math.floor(diff%3600000/60000)).padStart(2,"0")+":"+String(Math.floor(diff%60000/1000)).padStart(2,"0");
    }
  },1000);
})();
</script>
